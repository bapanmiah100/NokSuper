<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Short video card – 9:16 size</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    /* short video card size – mobile, 9:16 (Instagram/Shorts ratio) */
    .video-container {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9 / 16;
      background: black;
    }
    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video src="video.mp4" autoplay muted loop controls></video>
  </div>
</body>
</html>
