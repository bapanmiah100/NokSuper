        body.studio-body { background: #0f0f1a; min-height: 100vh; }

        .studio-main { flex: 1; min-width: 0; display: flex; flex-direction: column; padding: 24px 32px 100px; }
        .studio-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        .studio-topbar__title { font-size: 1.75rem; font-weight: 700; color: #fff; margin: 0; }
        .studio-topbar__back { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 10px; background: rgba(139,92,246,0.25); color: #e9d5ff; font-size: 0.9rem; font-weight: 600; text-decoration: none; margin-bottom: 24px; width: fit-content; transition: all 0.2s; }
        .studio-topbar__back:hover { background: rgba(139,92,246,0.4); color: #fff; }
        .studio-section { margin-bottom: 28px; }
        .studio-section__title { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 16px; }
        .studio-table-wrap { background: rgba(30,30,50,0.6); border: 1px solid rgba(139,92,246,0.15); border-radius: 16px; overflow: hidden; }
        .studio-table { width: 100%; border-collapse: collapse; }
        .studio-table th { text-align: left; padding: 14px 20px; font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .studio-table th:nth-child(2), .studio-table th:nth-child(3), .studio-table th:nth-child(4), .studio-table th:nth-child(5) { text-align: center; min-width: 72px; }
        .studio-table th:last-child { text-align: center; width: 56px; }
        .studio-table td { padding: 14px 20px; font-size: 0.9rem; color: rgba(255,255,255,0.9); border-bottom: 1px solid rgba(255,255,255,0.06); }
        .studio-table td:nth-child(2), .studio-table td:nth-child(3), .studio-table td:nth-child(4), .studio-table td:nth-child(5) { text-align: center; white-space: nowrap; }
        .studio-table td:last-child { text-align: center; }
        .studio-table tr:last-child td { border-bottom: none; }
        .studio-table tbody tr:hover { background: rgba(255,255,255,0.04); }
        .studio-table__empty { padding: 40px 20px; text-align: center; color: rgba(255,255,255,0.4); font-size: 0.9rem; }
        .studio-table .studio-table__link { color: #a78bfa; text-decoration: none; font-weight: 600; }
        .studio-table .studio-table__link:hover { text-decoration: underline; }
        .studio-table__video-cell { display: flex; align-items: center; gap: 12px; }
        .studio-table__thumb { width: 120px; min-width: 120px; height: 68px; border-radius: 8px; background: rgba(139,92,246,0.2); object-fit: cover; }
        .studio-table__thumb-placeholder { width: 120px; min-width: 120px; height: 68px; border-radius: 8px; background: linear-gradient(135deg, rgba(139,92,246,0.3) 0%, rgba(99,102,241,0.3) 100%); display: flex; align-items: center; justify-content: center; }
        .studio-table__thumb-placeholder svg { width: 28px; height: 28px; color: rgba(255,255,255,0.5); }
        .studio-table__video-title { font-weight: 600; }
        .studio-table__video-thumb-link { flex-shrink: 0; text-decoration: none; line-height: 0; }
        .studio-table__play-link { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background: rgba(139,92,246,0.3); color: #fff; text-decoration: none; transition: background 0.2s; }
        .studio-table__play-link:hover { background: rgba(139,92,246,0.5); color: #fff; }
        .studio-table__play-link svg { width: 18px; height: 18px; }

    <script>
    (function() {
        function getCaptionPosts() { try { return JSON.parse(localStorage.getItem('nokCaptionPosts') || '[]'); } catch (e) { return []; } }
        function fmtNum(n) { return n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'K' : n; }
        var body = document.getElementById('studio-captions-body');
        if (body) {
            var list = getCaptionPosts();
            if (list.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="studio-table__empty">No captions yet. Share a caption to see analytics here.</td></tr>';
            } else {
                body.innerHTML = list.map(function(c) {
                    var text = ((c.caption || '').substring(0, 80) || 'Caption').replace(/</g, '&lt;');
                    var likes = fmtNum(parseInt(c.likes || 0, 10));
                    var commentsCount = Array.isArray(c.comments) ? c.comments.length : (parseInt(c.comments || 0, 10));
                    var viewUrl = 'home.html';
                    var thumbHtml = '';
                    if (c.photoData && typeof c.photoData === 'string' && c.photoData.indexOf('data:') === 0) {
                        thumbHtml = '<img src="' + c.photoData.replace(/"/g, '&quot;') + '" alt="" class="studio-table__thumb">';
                    } else {
                        thumbHtml = '<div class="studio-table__thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>';
                    }
                    return '<tr><td><div class="studio-table__video-cell"><span class="studio-table__video-thumb-link">' + thumbHtml + '</span><span class="studio-table__video-title" title="' + text.replace(/"/g, '&quot;') + '">' + text + (text.length >= 80 ? '…' : '') + '</span></div></td><td>' + likes + '</td><td>' + commentsCount + '</td><td>Published</td><td><a href="' + viewUrl + '" class="studio-table__play-link" title="View" aria-label="View"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></a></td></tr>';
                }).join('');
            }
        }
    })();
    </script>
