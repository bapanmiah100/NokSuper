<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body.studio-body { min-height: 100vh; }
        .studio-layout { display: flex; min-height: 100vh; }
        .studio-sidebar { width: 240px; background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%); flex-shrink: 0; padding: 20px 0; display: flex; flex-direction: column; }
        .studio-sidebar__logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
        .studio-sidebar__logo-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .studio-sidebar__logo-icon svg { width: 20px; height: 20px; color: #fff; }
        .studio-sidebar__logo-text { font-size: 1.25rem; font-weight: 700; color: #fff; }
        .studio-sidebar__nav { display: flex; flex-direction: column; gap: 4px; }
        .studio-sidebar__item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: background 0.2s, color 0.2s; }
        .studio-sidebar__item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .studio-sidebar__item svg { width: 22px; height: 22px; flex-shrink: 0; }
        .studio-main { flex: 1; min-width: 0; display: flex; flex-direction: column; padding: 24px 32px 100px; }
        .studio-topbar__back { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 10px; background: rgba(139,92,246,0.25); color: #e9d5ff; font-size: 0.9rem; font-weight: 600; text-decoration: none; margin-bottom: 24px; width: fit-content; transition: all 0.2s; }
        .studio-topbar__back:hover { background: rgba(139,92,246,0.4); color: #fff; }
        .studio-topbar__title { font-size: 1.75rem; font-weight: 700; color: #fff; margin: 0 0 18px 0; }
        .studio-card { background: rgba(30,30,50,0.6); border: 1px solid rgba(139,92,246,0.18); border-radius: 16px; padding: 18px; }
        .promo-grid { display: grid; grid-template-columns: 320px 1fr; gap: 18px; align-items: start; }
        @media (max-width: 900px) { .promo-grid { grid-template-columns: 1fr; } }
        .promo-video { display: flex; gap: 14px; align-items: center; }
        .promo-thumb { width: 160px; height: 90px; border-radius: 10px; object-fit: cover; background: rgba(139,92,246,0.2); }
        .promo-thumb-placeholder { width: 160px; height: 90px; border-radius: 10px; background: linear-gradient(135deg, rgba(249,115,22,0.3) 0%, rgba(251,146,60,0.3) 100%); display: flex; align-items: center; justify-content: center; }
        .promo-thumb-placeholder svg { width: 34px; height: 34px; color: rgba(255,255,255,0.55); }
        .promo-title { font-size: 1.05rem; font-weight: 700; color: #fff; margin: 0 0 6px 0; line-height: 1.2; }
        .promo-sub { color: rgba(255,255,255,0.55); font-size: 0.85rem; }
        .form { display: grid; gap: 12px; }
        .field { display: grid; gap: 6px; }
        .label { color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 600; }
        .input, .select { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(139,92,246,0.35); background: rgba(30,30,50,0.8); color: #fff; font-size: 0.95rem; outline: none; }
        .input:focus, .select:focus { border-color: rgba(139,92,246,0.7); }
        .hint { color: rgba(255,255,255,0.45); font-size: 0.8rem; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(139,92,246,0.35); background: rgba(139,92,246,0.25); color: #e9d5ff; font-weight: 700; cursor: pointer; text-decoration: none; }
        .btn:hover { background: rgba(139,92,246,0.4); color: #fff; border-color: rgba(139,92,246,0.6); }
        .btn--ghost { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.12); }
        .btn--ghost:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn--danger { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.35); color: #fecaca; }
        .btn--danger:hover { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.55); color: #fff; }
        .toast { margin-top: 10px; color: rgba(255,255,255,0.6); font-size: 0.9rem; }
        .toast--ok { color: #86efac; }
        .toast--err { color: #fca5a5; }
    </style>
</head>

    <script>
    (function() {
        function qs(name) { return new URLSearchParams(location.search).get(name) || ''; }
        function getUserVideos() { try { return JSON.parse(localStorage.getItem('nokUserVideos') || '[]'); } catch (e) { return []; } }
        function getShorts() { try { return JSON.parse(localStorage.getItem('nokShortsVideos') || '[]'); } catch (e) { return []; } }
        function getPromotionVideos() { try { return JSON.parse(localStorage.getItem('nokPromotionVideos') || '[]'); } catch (e) { return []; } }
        function getPromotionShorts() { try { return JSON.parse(localStorage.getItem('nokPromotionShorts') || '[]'); } catch (e) { return []; } }
        function setPromotionVideos(arr) { localStorage.setItem('nokPromotionVideos', JSON.stringify(arr)); localStorage.setItem('nokPromotionVideoCount', String(arr.length)); }
        function setPromotionShorts(arr) { localStorage.setItem('nokPromotionShorts', JSON.stringify(arr)); }

        var id = qs('id');
        var type = (qs('type') || '').toLowerCase();
        var isShort = type === 'short';
        var video = null;
        var short = null;
        if (isShort) {
            var shorts = getShorts();
            for (var i = 0; i < shorts.length; i++) { if (String(shorts[i].id) === String(id)) { short = shorts[i]; break; } }
        } else {
            var videos = getUserVideos();
            for (var i = 0; i < videos.length; i++) { if (String(videos[i].id) === String(id)) { video = videos[i]; break; } }
        }
        var item = isShort ? short : video;

        var backLink = document.getElementById('promo-back-link');
        var backText = document.getElementById('promo-back-text');
        var cancelLink = document.getElementById('promo-cancel-link');
        if (isShort) {
            if (backLink) backLink.href = 'studio-shorts.html';
            if (backText) backText.textContent = 'Back to Short Analytics';
            if (cancelLink) cancelLink.href = 'studio-shorts.html';
        } else {
            if (backLink) backLink.href = 'studio-videos.html';
            if (backText) backText.textContent = 'Back to Video Analytics';
            if (cancelLink) cancelLink.href = 'studio-videos.html';
        }

        var titleEl = document.getElementById('promo-title');
        var subEl = document.getElementById('promo-sub');
        var thumbWrap = document.getElementById('promo-thumb-wrap');
        var toast = document.getElementById('promo-toast');
        function setToast(msg, kind) {
            if (!toast) return;
            toast.textContent = msg || '';
            toast.className = 'toast' + (kind === 'ok' ? ' toast--ok' : kind === 'err' ? ' toast--err' : '');
        }

        if (!item) {
            if (titleEl) titleEl.textContent = isShort ? 'Short not found' : 'Video not found';
            if (subEl) subEl.textContent = isShort ? 'Go back and select a short to promote.' : 'Go back and select a video to promote.';
            if (thumbWrap) thumbWrap.innerHTML = '<div class="promo-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/><path d="M12 9v6M9 12h6"/></svg></div>';
            setToast('Missing ' + (isShort ? 'short' : 'video') + ' id.', 'err');
        } else {
            var safeTitle = (item.title || item.id || (isShort ? 'Short' : 'Untitled')).toString();
            if (titleEl) titleEl.textContent = safeTitle;
            if (subEl) subEl.textContent = 'Set budget and objective for this promotion.';
            if (thumbWrap) {
                var thumbData = item.thumbData || (item.videoData && item.videoData.indexOf && item.videoData.indexOf('data:') === 0 ? item.videoData : null);
                if (thumbData && typeof thumbData === 'string' && thumbData.indexOf('data:') === 0) {
                    thumbWrap.innerHTML = '<img class="promo-thumb" src="' + thumbData.replace(/"/g, '&quot;') + '" alt="">';
                } else {
                    thumbWrap.innerHTML = '<div class="promo-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/><path d="M12 9v6M9 12h6"/></svg></div>';
                }
            }
        }

        var promo = isShort ? getPromotionShorts() : getPromotionVideos();
        var existing = null;
        for (var j = 0; j < promo.length; j++) { if (String(promo[j].id) === String(id)) { existing = promo[j]; break; } }

        var objectiveEl = document.getElementById('promo-objective');
        var audienceEl = document.getElementById('promo-audience');
        var ageEl = document.getElementById('promo-age');
        var dailyEl = document.getElementById('promo-daily');
        var daysEl = document.getElementById('promo-days');
        var removeBtn = document.getElementById('promo-remove');
        var form = document.getElementById('promo-form');

        function prefill() {
            if (!existing) {
                if (removeBtn) removeBtn.style.display = 'none';
                return;
            }
            if (objectiveEl && existing.objective) objectiveEl.value = existing.objective;
            if (audienceEl && existing.audience) audienceEl.value = existing.audience;
            if (ageEl && existing.ageRange) ageEl.value = existing.ageRange;
            if (dailyEl && existing.dailyBudget != null) dailyEl.value = existing.dailyBudget;
            if (daysEl && existing.durationDays != null) daysEl.value = existing.durationDays;
        }
        if (item) prefill();

        if (form && item) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                var objective = (objectiveEl && objectiveEl.value) ? objectiveEl.value : 'more_views';
                var audience = (audienceEl && audienceEl.value) ? audienceEl.value.trim() : '';
                var ageRange = (ageEl && ageEl.value) ? ageEl.value : '';
                var dailyBudget = dailyEl ? parseFloat(dailyEl.value || '0') : 0;
                var durationDays = daysEl ? parseInt(daysEl.value || '0', 10) : 0;

                if (!durationDays || durationDays < 1) { setToast('Duration must be at least 1 day.', 'err'); return; }
                if (dailyBudget < 0 || isNaN(dailyBudget)) { setToast('Daily budget is invalid.', 'err'); return; }

                var startAt = new Date().toISOString();
                var end = new Date();
                end.setDate(end.getDate() + durationDays);
                var endAt = end.toISOString();
                var channelSubs = parseInt(localStorage.getItem('nokTotalSubscribers') || '0', 10) || 0;

                if (isShort) {
                    var views = parseInt(String(short.views || short.viewCount || '0').replace(/K/g, '000').replace(/M/g, '000000'), 10) || 0;
                    var likes = parseInt(String(short.likes || '0').replace(/K/g, '000').replace(/M/g, '000000'), 10) || 0;
                    var entry = {
                        id: short.id,
                        title: short.title,
                        thumbData: short.thumbData || short.videoData,
                        views: views,
                        likes: likes,
                        subscribers: channelSubs,
                        visibility: short.visibility || 'public',
                        objective: objective,
                        audience: audience,
                        ageRange: ageRange,
                        dailyBudget: dailyBudget,
                        durationDays: durationDays,
                        totalBudget: Math.max(0, dailyBudget * durationDays),
                        startAt: startAt,
                        endAt: endAt,
                        status: 'promoting',
                        type: 'short'
                    };
                    var arr = getPromotionShorts();
                    var replaced = false;
                    for (var k = 0; k < arr.length; k++) {
                        if (String(arr[k].id) === String(short.id)) {
                            arr[k] = Object.assign({}, arr[k], entry);
                            replaced = true;
                            break;
                        }
                    }
                    if (!replaced) arr.push(entry);
                    setPromotionShorts(arr);
                    setToast('Promotion saved. Total budget: $' + entry.totalBudget.toFixed(2), 'ok');
                    setTimeout(function() { location.href = 'studio-promotion.html'; }, 500);
                } else {
                    var entry = {
                        id: video.id,
                        title: video.title,
                        thumbData: video.thumbData,
                        views: video.views || 0,
                        likes: video.likes || 0,
                        subscribers: (video.subscribers != null && video.subscribers !== '') ? video.subscribers : channelSubs,
                        visibility: video.visibility || 'public',
                        objective: objective,
                        audience: audience,
                        ageRange: ageRange,
                        dailyBudget: dailyBudget,
                        durationDays: durationDays,
                        totalBudget: Math.max(0, dailyBudget * durationDays),
                        startAt: startAt,
                        endAt: endAt,
                        status: 'promoting'
                    };
                    var arr = getPromotionVideos();
                    var replaced = false;
                    for (var k = 0; k < arr.length; k++) {
                        if (String(arr[k].id) === String(video.id)) {
                            arr[k] = Object.assign({}, arr[k], entry);
                            replaced = true;
                            break;
                        }
                    }
                    if (!replaced) arr.push(entry);
                    setPromotionVideos(arr);
                    setToast('Promotion saved. Total budget: $' + entry.totalBudget.toFixed(2), 'ok');
                    setTimeout(function() { location.href = 'studio-promotion.html'; }, 500);
                }
            });
        }

        if (removeBtn && item) {
            removeBtn.addEventListener('click', function() {
                if (isShort) {
                    var arr = getPromotionShorts().filter(function(p) { return String(p.id) !== String(short.id); });
                    setPromotionShorts(arr);
                    setToast('Removed from promotion.', 'ok');
                    setTimeout(function() { location.href = 'studio-shorts.html'; }, 350);
                } else {
                    var arr = getPromotionVideos().filter(function(p) { return String(p.id) !== String(video.id); });
                    setPromotionVideos(arr);
                    setToast('Removed from promotion.', 'ok');
                    setTimeout(function() { location.href = 'studio-videos.html'; }, 350);
                }
            });
        }
    })();
    </script>
    <script src="nok-header-drawer.js"></script>
    <script src="nok-chat-overlay.js"></script>
</body>
