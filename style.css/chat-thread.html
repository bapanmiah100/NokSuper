<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f1729">
    <title>Chat - NOK Super</title>
    <script src="nok-studio-auth.js"></script>
    <script src="nok-theme.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="video-long.css">
    <style>
        .chat-thread-page {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            color: #fff;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom, 0px);
            background: #0f1729;
        }
        .chat-thread-page .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 120% 80% at 50% -20%, rgba(59, 130, 246, 0.12), transparent 50%),
                linear-gradient(180deg, #0f1729 0%, #111827 45%, #0c1222 100%);
            background-size: cover;
        }
        .chat-thread-page .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        .chat-thread-header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            padding-top: max(8px, env(safe-area-inset-top, 0px));
            background: rgba(15, 23, 41, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .chat-thread-back {
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .chat-thread-back:active { opacity: 0.75; }
        .chat-thread-peer {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }
        .chat-thread-avatar-wrap { position: relative; flex-shrink: 0; }
        .chat-thread-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(145deg, #4f6fff, #7c3aed);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.12);
        }
        .chat-thread-online-dot {
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #22c55e;
            border: 2px solid #0f1729;
            box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.4);
        }
        .chat-thread-titles { min-width: 0; }
        .chat-thread-name {
            margin: 0;
            font-size: 1.02rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.02em;
        }
        .chat-thread-sub {
            margin: 2px 0 0;
            font-size: 0.78rem;
            font-weight: 500;
            color: #22c55e;
        }
        .chat-thread-header-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .chat-thread-hd-btn {
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: rgba(255, 255, 255, 0.88);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-thread-hd-btn:active { background: rgba(255, 255, 255, 0.08); }
        .chat-thread-messages {
            position: relative;
            z-index: 1;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 16px 14px 110px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .chat-thread-messages::-webkit-scrollbar { display: none; width: 0; height: 0; }
        .chat-thread-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 100%;
        }
        .chat-thread-row--me {
            flex-direction: row-reverse;
            align-self: flex-end;
        }
        .chat-thread-row--them { align-self: flex-start; }
        .chat-thread-bubble {
            max-width: min(78vw, 280px);
            padding: 10px 14px 10px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
        }
        .chat-thread-bubble--them {
            background: #e8e6f2;
            color: #111827;
            border-bottom-left-radius: 6px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
        }
        .chat-thread-bubble--me {
            background: #2563eb;
            color: #fff;
            border-bottom-right-radius: 6px;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.35);
        }
        .chat-thread-row-time {
            font-size: 0.68rem;
            color: rgba(255, 255, 255, 0.38);
            white-space: nowrap;
            padding-bottom: 4px;
            flex-shrink: 0;
        }
        .chat-thread-read {
            display: block;
            text-align: right;
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.75);
            margin-top: 4px;
            letter-spacing: -0.05em;
        }
        .chat-thread-compose {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom, 0px));
            background: rgba(12, 17, 32, 0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }
        .chat-thread-emoji-btn {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            border: none;
            border-radius: 12px;
            background: transparent;
            font-size: 1.35rem;
            cursor: pointer;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-thread-input-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 46px;
            padding: 6px 12px 6px 14px;
            border-radius: 24px;
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .chat-thread-input {
            flex: 1;
            min-height: 32px;
            max-height: 100px;
            padding: 6px 0;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            line-height: 1.4;
        }
        .chat-thread-input:focus { outline: none; }
        .chat-thread-input::placeholder { color: rgba(255, 255, 255, 0.35); }
        .chat-thread-mic-inline {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-thread-send-fab {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.45);
        }
        .chat-thread-send-fab:active { transform: scale(0.96); }
        .chat-thread-empty {
            text-align: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.9rem;
            padding: 32px 16px;
            line-height: 1.55;
        }
        .chat-thread-empty strong { color: rgba(255, 255, 255, 0.85); font-weight: 600; }
    </style>
</head>
<body class="chat-thread-page">
    <div class="bg" aria-hidden="true"></div>
    <header class="chat-thread-header">
        <button type="button" class="chat-thread-back" id="chat-thread-back" aria-label="Back">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="chat-thread-peer">
            <div class="chat-thread-avatar-wrap">
                <div class="chat-thread-avatar" id="chat-thread-avatar" aria-hidden="true">?</div>
                <span class="chat-thread-online-dot" aria-hidden="true"></span>
            </div>
            <div class="chat-thread-titles">
                <h1 class="chat-thread-name" id="chat-thread-name">Chat</h1>
                <p class="chat-thread-sub" id="chat-thread-sub">online</p>
            </div>
        </div>
        <div class="chat-thread-header-actions">
            <button type="button" class="chat-thread-hd-btn" aria-label="Voice call" id="chat-thread-call-demo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </button>
            <button type="button" class="chat-thread-hd-btn" aria-label="Video call" id="chat-thread-video-demo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            </button>
            <button type="button" class="chat-thread-hd-btn" aria-label="More" id="chat-thread-more-demo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="18" r="1.5"/></svg>
            </button>
        </div>
    </header>
    <main class="chat-thread-messages" id="chat-thread-messages" aria-live="polite"></main>
    <div class="chat-thread-compose">
        <button type="button" class="chat-thread-emoji-btn" id="chat-thread-emoji" aria-label="Emoji">😊</button>
        <div class="chat-thread-input-wrap">
            <textarea class="chat-thread-input" id="chat-thread-input" rows="1" placeholder="Type a message…" maxlength="2000" aria-label="Message"></textarea>
            <button type="button" class="chat-thread-mic-inline" aria-label="Voice" id="chat-thread-mic-demo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
        </div>
        <button type="button" class="chat-thread-send-fab" id="chat-thread-send" aria-label="Send">
            <span id="chat-thread-send-icon-send" style="display:flex"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></span>
            <span id="chat-thread-send-icon-mic" style="display:none"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg></span>
        </button>
    </div>
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search || '');
        var peerId = (params.get('id') || 'direct').replace(/[^a-z0-9_-]/gi, '').slice(0, 64) || 'direct';
        var peerName = params.get('name') || params.get('with') || 'Chat';
        try { peerName = decodeURIComponent(peerName).trim() || 'Chat'; } catch (_) {}

        function initials(name) {
            var p = String(name).trim().split(/\s+/).filter(Boolean);
            if (!p.length) return '?';
            if (p.length === 1) return p[0].substring(0, 2).toUpperCase();
            return (p[0].charAt(0) + p[p.length - 1].charAt(0)).toUpperCase();
        }

        function storageKey() { return 'nokChatThread_v1_' + peerId; }

        function loadMessages() {
            try {
                var raw = localStorage.getItem(storageKey());
                if (!raw) return [];
                var arr = JSON.parse(raw);
                return Array.isArray(arr) ? arr : [];
            } catch (_) { return []; }
        }

        function saveMessages(arr) {
            try { localStorage.setItem(storageKey(), JSON.stringify(arr)); } catch (_) {}
        }

        function esc(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function formatTime(ts) {
            var d = new Date(ts);
            if (isNaN(d.getTime())) return '';
            return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
        }

        var listEl = document.getElementById('chat-thread-messages');
        var inputEl = document.getElementById('chat-thread-input');
        var sendBtn = document.getElementById('chat-thread-send');
        var sendIconSend = document.getElementById('chat-thread-send-icon-send');
        var sendIconMic = document.getElementById('chat-thread-send-icon-mic');
        var nameEl = document.getElementById('chat-thread-name');
        var avatarEl = document.getElementById('chat-thread-avatar');

        function updateSendFab() {
            var has = (inputEl.value || '').trim().length > 0;
            if (sendIconSend && sendIconMic) {
                sendIconSend.style.display = has ? 'flex' : 'none';
                sendIconMic.style.display = has ? 'none' : 'flex';
            }
            sendBtn.setAttribute('aria-label', has ? 'Send' : 'Voice (demo)');
        }

        document.title = peerName + ' · NOK Chat';
        nameEl.textContent = peerName;
        avatarEl.textContent = initials(peerName);

        var demoReplies = [
            'Got it 👍',
            'Thanks — I’ll read this soon.',
            'Okay, noted!',
            'হ্যালো, মেসেজ পেয়েছি।',
            'Sounds good!',
            'Demo chat — stored on this device only.',
            'Typing… just kidding 😄',
            'Nice to hear from you!'
        ];

        function scheduleDemoReply() {
            var delay = 800 + Math.floor(Math.random() * 1400);
            setTimeout(function() {
                var msg = demoReplies[Math.floor(Math.random() * demoReplies.length)];
                messages.push({ from: 'them', text: msg, ts: Date.now() });
                saveMessages(messages);
                render(messages);
            }, delay);
        }

        function render(messages) {
            listEl.innerHTML = '';
            if (!messages.length) {
                var empty = document.createElement('p');
                empty.className = 'chat-thread-empty';
                empty.innerHTML = 'No messages yet. <strong>Type below</strong> — demo reply will come (saved on this device only).';
                listEl.appendChild(empty);
                return;
            }
            var lastMeIdx = -1;
            for (var i = messages.length - 1; i >= 0; i--) {
                if (messages[i].from === 'me') { lastMeIdx = i; break; }
            }
            messages.forEach(function(m, idx) {
                var row = document.createElement('div');
                row.className = 'chat-thread-row ' + (m.from === 'me' ? 'chat-thread-row--me' : 'chat-thread-row--them');
                var bubble = document.createElement('div');
                bubble.className = 'chat-thread-bubble ' + (m.from === 'me' ? 'chat-thread-bubble--me' : 'chat-thread-bubble--them');
                var inner = esc(m.text || '');
                if (m.from === 'me' && idx === lastMeIdx) {
                    inner += '<span class="chat-thread-read" aria-hidden="true">✓✓</span>';
                }
                bubble.innerHTML = inner;
                var timeEl = document.createElement('span');
                timeEl.className = 'chat-thread-row-time';
                timeEl.textContent = formatTime(m.ts);
                row.appendChild(bubble);
                row.appendChild(timeEl);
                listEl.appendChild(row);
            });
            listEl.scrollTop = listEl.scrollHeight;
        }

        var messages = loadMessages();
        if (!messages.length) {
            var seed = params.get('preview');
            if (seed) {
                try { seed = decodeURIComponent(seed); } catch (_) {}
                if (seed) {
                    messages.push({ from: 'them', text: seed, ts: Date.now() - 60000 });
                    saveMessages(messages);
                }
            }
        }
        render(messages);

        function send() {
            var text = (inputEl.value || '').trim();
            if (!text) return;
            messages.push({ from: 'me', text: text, ts: Date.now() });
            saveMessages(messages);
            inputEl.value = '';
            inputEl.style.height = '';
            updateSendFab();
            render(messages);
            scheduleDemoReply();
        }

        sendBtn.addEventListener('click', function() {
            if ((inputEl.value || '').trim()) send();
        });
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });
        inputEl.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            updateSendFab();
        });
        updateSendFab();

        document.getElementById('chat-thread-back').addEventListener('click', function() {
            if (window.history.length > 1) window.history.back();
            else window.location.href = 'home.html';
        });

        ['chat-thread-call-demo', 'chat-thread-video-demo', 'chat-thread-more-demo', 'chat-thread-emoji', 'chat-thread-mic-demo'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.addEventListener('click', function(e) { e.preventDefault(); });
        });
    })();
    </script>
</body>
</html>
