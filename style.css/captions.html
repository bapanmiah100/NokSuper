<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captions - NOK Super</title>
    <script src="nok-theme.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="video-long.css">
    <style>
        .captions-body { min-height: 100vh; background: var(--glass-bg); }
        .captions-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .captions-back { color: rgba(255,255,255,0.9); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; font-size: 0.95rem; }
        .captions-back:hover { color: var(--accent-light); }
        .captions-title { font-size: 1.25rem; font-weight: 700; color: #fff; margin: 0; }
        .captions-feed { max-width: 640px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }
        .caption-card { background: rgba(22,22,42,0.5); border: 1px solid rgba(139,92,246,0.2); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .caption-card__head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .caption-card__avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #6366f1); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; flex-shrink: 0; overflow: hidden; }
        .caption-card__avatar img { width: 100%; height: 100%; object-fit: cover; }
        .caption-card__meta { flex: 1; min-width: 0; }
        .caption-card__author { font-weight: 600; color: #fff; font-size: 0.95rem; }
        .caption-card__time { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
        .caption-card__text { font-size: 0.95rem; color: rgba(255,255,255,0.9); line-height: 1.5; margin-bottom: 12px; white-space: pre-wrap; word-break: break-word; }
        .caption-card__photo { border-radius: 12px; overflow: hidden; margin-bottom: 12px; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; }
        .caption-card__photo img { max-width: 100%; width: auto; max-height: 75vh; height: auto; object-fit: contain; display: block; }
        .caption-card__actions { display: flex; align-items: center; gap: 20px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); flex-wrap: wrap; }
        .caption-card__btn { display: inline-flex; align-items: center; gap: 8px; background: none; border: none; color: rgba(255,255,255,0.7); font-size: 0.9rem; cursor: pointer; padding: 4px 0; }
        .caption-card__btn:hover { color: var(--accent-light); }
        .caption-card__btn--gift { padding: 10px 18px; border-radius: 999px; background: linear-gradient(135deg, rgba(249,115,22,0.28), rgba(236,72,153,0.24)); border: 1px solid rgba(251,191,36,0.28); color: #fff; font-weight: 700; }
        .caption-card__btn--gift:hover { color: #fff; background: linear-gradient(135deg, rgba(249,115,22,0.42), rgba(236,72,153,0.32)); }
        .caption-card__btn svg { width: 20px; height: 20px; }
        .caption-comments { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); }
        .caption-comments__list { margin-bottom: 12px; }
        .caption-comment { display: flex; gap: 10px; margin-bottom: 12px; }
        .caption-comment__avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(139,92,246,0.4); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; flex-shrink: 0; }
        .caption-comment__body { flex: 1; min-width: 0; }
        .caption-comment__line { font-size: 0.9rem; color: rgba(255,255,255,0.9); }
        .caption-comment__line strong { color: #fff; margin-right: 6px; }
        .caption-comment__reply-btn { background: none; border: none; color: rgba(139,92,246,0.9); font-size: 0.8rem; cursor: pointer; padding: 2px 0; margin-top: 2px; }
        .caption-comment__reply-btn:hover { text-decoration: underline; }
        .caption-comment__replies { margin-left: 42px; margin-top: 8px; }
        .caption-comment--reply .caption-comment__avatar { width: 28px; height: 28px; font-size: 0.7rem; }
        .caption-comment--reply .caption-comment__line { font-size: 0.85rem; }
        .caption-comments__input-wrap { display: flex; gap: 8px; margin-top: 12px; }
        .caption-comments__input { flex: 1; padding: 10px 14px; border: 1px solid rgba(139,92,246,0.3); border-radius: 20px; background: rgba(0,0,0,0.3); color: #fff; font-size: 0.9rem; }
        .caption-comments__input::placeholder { color: rgba(255,255,255,0.4); }
        .caption-comments__submit { padding: 10px 20px; border: none; border-radius: 20px; background: linear-gradient(135deg, #8b5cf6, #6366f1); color: #fff; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        .caption-comments__submit:hover { opacity: 0.9; }
        .caption-reply-input-wrap { margin-top: 8px; margin-left: 42px; display: flex; gap: 8px; }
        .caption-comments__login-prompt { margin-top: 12px; padding: 10px 0; }
        .caption-comments__login-link { color: var(--accent-light); text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .caption-comments__login-link:hover { text-decoration: underline; }
        .caption-empty { text-align: center; padding: 48px 24px; color: rgba(255,255,255,0.5); }
        .caption-empty a { color: var(--accent-light); text-decoration: none; }
        .caption-empty a:hover { text-decoration: underline; }
    </style>
</head>

    <div class="shorts-coin-modal caption-gift-modal" id="caption-gift-modal" aria-hidden="true">
        <div class="shorts-coin-modal__backdrop" id="caption-gift-backdrop"></div>
        <div class="shorts-coin-modal__panel">
            <h3 class="shorts-coin-modal__title">Send coin gift</h3>

                <button type="button" class="shorts-coin-modal__opt" data-amount="5">5</button>
                <button type="button" class="shorts-coin-modal__opt" data-amount="10">10</button>
                <button type="button" class="shorts-coin-modal__opt" data-amount="25">25</button>
                <button type="button" class="shorts-coin-modal__opt" data-amount="50">50</button>

    <script>
    (function() {
        var listEl = document.getElementById('captions-list');
        var emptyEl = document.getElementById('captions-empty');
        var currentUser = localStorage.getItem('nokUserChannel') || sessionStorage.getItem('nokUserEmail') || 'You';
        function isLoggedIn() {
            return (sessionStorage.getItem('nokAuth') === 'loggedIn') || (localStorage.getItem('nokAuth') === 'loggedIn');
        }
        function requireLoginForAction(action) {
            if (isLoggedIn()) return true;
            if (action === 'like' || action === 'comment' || action === 'gift') {
                window.location.href = 'login.html?next=' + encodeURIComponent('captions.html');
            }
            return false;
        }

        function getPosts() {
            try { return JSON.parse(localStorage.getItem('nokCaptionPosts') || '[]'); } catch (e) { return []; }
        }
        function savePosts(posts) {
            try { localStorage.setItem('nokCaptionPosts', JSON.stringify(posts)); } catch (e) {}
        }
        function getCaptionGifts() {
            try { return JSON.parse(localStorage.getItem('nokCaptionGifts') || '{}'); } catch (e) { return {}; }
        }
        function saveCaptionGifts(map) {
            try { localStorage.setItem('nokCaptionGifts', JSON.stringify(map)); } catch (e) {}
        }
        function getCaptionGiftCount(postId) {
            var map = getCaptionGifts();
            return parseInt(map[postId] || 0, 10) || 0;
        }
        function addCaptionGift(postId, amount) {
            var map = getCaptionGifts();
            map[postId] = (parseInt(map[postId] || 0, 10) || 0) + (amount || 0);
            saveCaptionGifts(map);
            return map[postId];
        }
        function getCaptionLikedPosts() { try { return JSON.parse(localStorage.getItem('nokCaptionLikedPosts') || '{}'); } catch (e) { return {}; } }
        function setCaptionLiked(postId) { var o = getCaptionLikedPosts(); o[postId] = true; try { localStorage.setItem('nokCaptionLikedPosts', JSON.stringify(o)); } catch (e) {} }
        function timeAgo(ts) {
            var d = Date.now() - ts;
            if (d < 60000) return 'Just now';
            if (d < 3600000) return Math.floor(d / 60000) + 'm ago';
            if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
            if (d < 604800000) return Math.floor(d / 86400000) + 'd ago';
            return new Date(ts).toLocaleDateString();
        }
        function initial(str) { return (str || '?').toString().trim().charAt(0).toUpperCase(); }

        function renderComment(c, isReply) {
            var div = document.createElement('div');
            div.className = 'caption-comment' + (isReply ? ' caption-comment--reply' : '');
            div.dataset.commentId = c.id;
            var line = (c.author || 'User') + ': ' + (c.text || '');
            div.innerHTML = '<div class="caption-comment__avatar">' + initial(c.author) + '</div><div class="caption-comment__body"><div class="caption-comment__line"><strong>' + (c.author || 'User') + '</strong>' + (c.text || '') + '</div>' + (!isReply ? '<button type="button" class="caption-comment__reply-btn" data-reply-to="' + c.id + '">Reply</button>' : '') + '</div>';
            return div;
        }

        function renderComments(postId, comments, container) {
            container.innerHTML = '';
            (comments || []).forEach(function(c) {
                var wrap = document.createElement('div');
                wrap.appendChild(renderComment(c, false));
                if (c.replies && c.replies.length) {
                    var repliesDiv = document.createElement('div');
                    repliesDiv.className = 'caption-comment__replies';
                    c.replies.forEach(function(r) { repliesDiv.appendChild(renderComment(r, true)); });
                    wrap.querySelector('.caption-comment__body').appendChild(repliesDiv);
                }
                container.appendChild(wrap);
            });
        }

        function renderPost(post) {
            var card = document.createElement('article');
            card.className = 'caption-card';
            card.dataset.postId = post.id;
            var avatarHtml = initial(post.author);
            var photoHtml = post.photoData ? '<div class="caption-card__photo"><img src="' + post.photoData.replace(/"/g, '&quot;') + '" alt=""></div>' : '';
            var commentInputHtml = isLoggedIn()
                ? '<div class="caption-comments__input-wrap"><input type="text" class="caption-comments__input" placeholder="Add a comment..." maxlength="300" data-post-id="' + post.id + '"><button type="button" class="caption-comments__submit" data-post-id="' + post.id + '">Comment</button></div>'
                : '<div class="caption-comments__login-prompt"><a href="login.html?next=' + encodeURIComponent('captions.html') + '" class="caption-comments__login-link">Log in to comment</a></div>';
            card.innerHTML = '<div class="caption-card__head"><div class="caption-card__avatar">' + avatarHtml + '</div><div class="caption-card__meta"><div class="caption-card__author">' + (post.author || 'User') + '</div><div class="caption-card__time">' + timeAgo(post.createdAt) + '</div></div></div>' + (post.caption ? '<div class="caption-card__text">' + (post.caption || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>' : '') + photoHtml + '<div class="caption-card__actions"><button type="button" class="caption-card__btn caption-like-btn" data-post-id="' + post.id + '" aria-label="Like"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg><span class="like-count">' + (post.likes || 0) + '</span></button><button type="button" class="caption-card__btn caption-comment-toggle" data-post-id="' + post.id + '" aria-label="Comment"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="comment-count">' + (post.comments ? post.comments.length : 0) + '</span></button><button type="button" class="caption-card__btn caption-share-btn" data-post-id="' + post.id + '" aria-label="Share"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg><span class="share-count">' + (post.shares || 0) + '</span></button><button type="button" class="caption-card__btn caption-card__btn--gift caption-gift-btn" data-post-id="' + post.id + '" aria-label="Gift"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-7"/><rect x="2" y="7" width="20" height="5" rx="1"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 1 1 0-5c3 0 4.5 5 4.5 5z"/><path d="M12 7h4.5a2.5 2.5 0 1 0 0-5c-3 0-4.5 5-4.5 5z"/></svg><span class="gift-count">' + getCaptionGiftCount(post.id) + '</span><span>Gift</span></button></div><div class="caption-comments" id="comments-' + post.id + '" style="display:none;"><div class="caption-comments__list"></div>' + commentInputHtml + '</div>';
            listEl.appendChild(card);

            var commentsContainer = card.querySelector('.caption-comments__list');
            renderComments(post.id, post.comments, commentsContainer);

            card.querySelector('.caption-like-btn').addEventListener('click', function() {
                if (!requireLoginForAction('like')) return;
                var liked = getCaptionLikedPosts();
                if (liked[post.id]) return;
                var posts = getPosts();
                var p = posts.find(function(x) { return x.id === post.id; });
                if (p) { p.likes = (p.likes || 0) + 1; savePosts(posts); setCaptionLiked(post.id); this.querySelector('.like-count').textContent = p.likes; }
            });
            card.querySelector('.caption-share-btn').addEventListener('click', function() {
                var posts = getPosts();
                var p = posts.find(function(x) { return x.id === post.id; });
                if (p) { p.shares = (p.shares || 0) + 1; savePosts(posts); this.querySelector('.share-count').textContent = p.shares; }
            });
            card.querySelector('.caption-comment-toggle').addEventListener('click', function() {
                var commentsDiv = card.querySelector('.caption-comments');
                commentsDiv.style.display = commentsDiv.style.display === 'none' ? 'block' : 'none';
            });
            card.querySelector('.caption-gift-btn').addEventListener('click', function() {
                if (!requireLoginForAction('gift')) return;
                window._captionGiftPostId = post.id;
                window._captionGiftActionEl = this.querySelector('.gift-count');
                var modal = document.getElementById('caption-gift-modal');
                var sel = document.getElementById('caption-gift-selected');
                var inp = document.getElementById('caption-gift-input');
                var opt = document.getElementById('caption-gift-options');
                if (sel) sel.textContent = '0 coins';
                if (inp) inp.value = '';
                if (opt) opt.querySelectorAll('.shorts-coin-modal__opt').forEach(function(o) { o.classList.remove('shorts-coin-modal__opt--active'); });
                if (modal) { modal.classList.add('shorts-coin-modal--open'); modal.setAttribute('aria-hidden', 'false'); }
            });
            var submitBtn = card.querySelector('.caption-comments__submit');
            if (submitBtn) {
                submitBtn.addEventListener('click', function() {
                    if (!requireLoginForAction('comment')) return;
                    var input = card.querySelector('.caption-comments__input');
                    var text = (input && input.value || '').trim();
                    if (!text) return;
                    var posts = getPosts();
                    var p = posts.find(function(x) { return x.id === post.id; });
                    if (!p) return;
                    p.comments = p.comments || [];
                    p.comments.push({ id: 'c_' + Date.now(), text: text, author: currentUser, createdAt: Date.now(), replies: [] });
                    savePosts(posts);
                    renderComments(p.id, p.comments, commentsContainer);
                    input.value = '';
                    card.querySelector('.comment-count').textContent = p.comments.length;
                    card.querySelector('.caption-comments').style.display = 'block';
                });
            }
            card.addEventListener('click', function(e) {
                var replyBtn = e.target.closest('.caption-comment__reply-btn');
                if (replyBtn) {
                    e.preventDefault();
                    if (!requireLoginForAction('comment')) return;
                    var commentId = replyBtn.dataset.replyTo;
                    var wrap = replyBtn.closest('.caption-comment__body');
                    var existing = wrap.querySelector('.caption-reply-input-wrap');
                    if (existing) { existing.remove(); return; }
                    var replyWrap = document.createElement('div');
                    replyWrap.className = 'caption-reply-input-wrap';
                    replyWrap.innerHTML = '<input type="text" class="caption-comments__input" placeholder="Write a reply..." maxlength="300" data-post-id="' + post.id + '" data-parent-id="' + commentId + '"><button type="button" class="caption-comments__submit" data-post-id="' + post.id + '" data-parent-id="' + commentId + '">Reply</button>';
                    wrap.appendChild(replyWrap);
                    replyWrap.querySelector('input').focus();
                    replyWrap.querySelector('button').addEventListener('click', function() {
                        var inp = replyWrap.querySelector('input');
                        var replyText = (inp && inp.value || '').trim();
                        if (!replyText) return;
                        var posts = getPosts();
                        var p = posts.find(function(x) { return x.id === post.id; });
                        if (!p || !p.comments) return;
                        var parent = p.comments.find(function(c) { return c.id === commentId; });
                        if (!parent) return;
                        parent.replies = parent.replies || [];
                        parent.replies.push({ id: 'r_' + Date.now(), text: replyText, author: currentUser, createdAt: Date.now() });
                        savePosts(posts);
                        replyWrap.remove();
                        renderComments(p.id, p.comments, commentsContainer);
                    });
                }
            });
        }

        function render() {
            var posts = getPosts();
            listEl.innerHTML = '';
            if (posts.length === 0) {
                emptyEl.style.display = 'block';
                return;
            }
            emptyEl.style.display = 'none';
            posts.forEach(renderPost);
            var hash = (window.location.hash || '').replace(/^#/, '');
            if (hash) {
                var card = listEl.querySelector('[data-post-id="' + hash + '"]');
                if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
            }
        }
        render();
        window.addEventListener('pageshow', render);

        (function initCaptionGiftModal() {
            var modal = document.getElementById('caption-gift-modal');
            var backdrop = document.getElementById('caption-gift-backdrop');
            var options = document.getElementById('caption-gift-options');
            var selectedEl = document.getElementById('caption-gift-selected');
            var inputEl = document.getElementById('caption-gift-input');
            var sendBtn = document.getElementById('caption-gift-send');
            var closeBtn = document.getElementById('caption-gift-close');
            var selectedAmount = 0;
            function getEff() { var v = inputEl ? parseInt(inputEl.value, 10) : NaN; if (!isNaN(v) && v > 0) return v; return selectedAmount; }
            function closeModal() {
                window._captionGiftPostId = null; window._captionGiftActionEl = null;
                if (modal) modal.classList.remove('shorts-coin-modal--open');
                if (selectedEl) selectedEl.textContent = '0 coins';
                if (inputEl) inputEl.value = '';
                if (options) options.querySelectorAll('.shorts-coin-modal__opt').forEach(function(o) { o.classList.remove('shorts-coin-modal__opt--active'); });
            }
            if (backdrop) backdrop.addEventListener('click', closeModal);
            if (closeBtn) closeBtn.addEventListener('click', closeModal);
            if (options) options.addEventListener('click', function(e) {
                var opt = e.target.closest('.shorts-coin-modal__opt');
                if (!opt) return;
                options.querySelectorAll('.shorts-coin-modal__opt').forEach(function(o) { o.classList.remove('shorts-coin-modal__opt--active'); });
                opt.classList.add('shorts-coin-modal__opt--active');
                selectedAmount = parseInt(opt.getAttribute('data-amount'), 10) || 0;
                if (selectedEl) selectedEl.textContent = selectedAmount + ' coins';
                if (inputEl) inputEl.value = selectedAmount > 0 ? selectedAmount : '';
            });
            if (inputEl) inputEl.addEventListener('input', function() { var v = parseInt(inputEl.value, 10); if (!isNaN(v) && v > 0) { selectedAmount = v; if (selectedEl) selectedEl.textContent = v + ' coins'; } });
            if (sendBtn) sendBtn.addEventListener('click', function() {
                var postId = window._captionGiftPostId;
                var actionEl = window._captionGiftActionEl;
                var amount = getEff();
                if (!postId || amount <= 0) return;
                addCaptionGift(postId, amount);
                if (actionEl) actionEl.textContent = getCaptionGiftCount(postId);
                closeModal();
            });
        })();
    })();
    </script>
</body>
</html>
