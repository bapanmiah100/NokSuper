        body.studio-body { background: #0f0f1a; min-height: 100vh; }

        .studio-sidebar { width: 240px; background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%); flex-shrink: 0; padding: 20px 0; display: flex; flex-direction: column; }

        .studio-sidebar__item svg { width: 22px; height: 22px; flex-shrink: 0; }
        .studio-main { flex: 1; min-width: 0; display: flex; flex-direction: column; padding: 24px 32px 100px; }
        .studio-topbar__back { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 10px; background: rgba(139,92,246,0.25); color: #e9d5ff; font-size: 0.9rem; font-weight: 600; text-decoration: none; margin-bottom: 24px; width: fit-content; transition: all 0.2s; }
        .studio-topbar__back:hover { background: rgba(139,92,246,0.4); color: #fff; }
        .studio-topbar__title { font-size: 1.75rem; font-weight: 700; color: #fff; margin: 0 0 24px 0; }
        .studio-edit-form { max-width: 640px; }
        .studio-edit-field { margin-bottom: 20px; }
        .studio-edit-field label { display: block; font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.8); margin-bottom: 8px; }
        .studio-edit-field input[type="text"], .studio-edit-field textarea { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid rgba(139,92,246,0.3); background: rgba(30,30,50,0.6); color: #fff; font-size: 0.95rem; box-sizing: border-box; }
        .studio-edit-field input[type="text"]:focus, .studio-edit-field textarea:focus { outline: none; border-color: rgba(139,92,246,0.6); }
        .studio-edit-field textarea { min-height: 80px; resize: vertical; }
        .studio-edit-thumb-wrap { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .studio-edit-thumb-preview { width: 200px; height: 112px; border-radius: 10px; background: rgba(139,92,246,0.2); object-fit: cover; }
        .studio-edit-thumb-placeholder { width: 200px; height: 112px; border-radius: 10px; background: linear-gradient(135deg, rgba(139,92,246,0.3) 0%, rgba(99,102,241,0.3) 100%); display: flex; align-items: center; justify-content: center; }
        .studio-edit-thumb-placeholder svg { width: 40px; height: 40px; color: rgba(255,255,255,0.5); }
        .studio-edit-thumb-upload { font-size: 0.9rem; color: #a78bfa; }
        .studio-edit-thumb-upload input { margin-top: 6px; font-size: 0.85rem; }
        .studio-edit-thumb-slot { display: flex; flex-direction: column; gap: 8px; max-width: 200px; }
        .studio-edit-thumb-slot label.slot-label { display: block; font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 0; }
        .studio-edit-actions { display: flex; gap: 12px; margin-top: 28px; }
        .studio-edit-btn { padding: 12px 24px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; display: inline-block; }
        .studio-edit-btn--primary { background: rgba(139,92,246,0.5); color: #fff; border: 1px solid rgba(139,92,246,0.6); }
        .studio-edit-btn--primary:hover { background: rgba(139,92,246,0.7); }
        .studio-edit-btn--ghost { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
        .studio-edit-btn--ghost:hover { background: rgba(255,255,255,0.12); }
        .studio-edit-error { color: #f87171; font-size: 0.9rem; margin-top: 8px; }
        .studio-edit-section { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid rgba(139,92,246,0.15); }
        .studio-edit-section:last-of-type { border-bottom: none; }
        .studio-edit-section__title { font-size: 1rem; font-weight: 700; color: #fff; margin: 0 0 16px 0; }
        .studio-edit-radios { display: flex; flex-wrap: wrap; gap: 12px; }
        .studio-edit-radio { display: flex; align-items: center; gap: 8px; cursor: pointer; color: rgba(255,255,255,0.9); font-size: 0.9rem; }

    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        var notfoundEl = document.getElementById('studio-edit-notfound');
        var formEl = document.getElementById('studio-edit-form');
        var titleInput = document.getElementById('edit-title');
        var descInput = document.getElementById('edit-desc');

        function getShorts() { try { return JSON.parse(localStorage.getItem('nokShortsVideos') || '[]'); } catch (e) { return []; } }

        if (!id) {
            if (notfoundEl) { notfoundEl.style.display = 'block'; notfoundEl.textContent = 'No short ID specified.'; }
        } else {
            var list = getShorts();
            var short = null;
            for (var i = 0; i < list.length; i++) {
                if (String(list[i].id) === String(id)) { short = list[i]; break; }
            }
            if (!short) {
                if (notfoundEl) notfoundEl.style.display = 'block';
            } else {
                if (formEl) formEl.style.display = 'block';
                if (titleInput) titleInput.value = short.title || short.id || '';
                if (descInput) descInput.value = short.desc || '';
                var vis = (short.visibility || short.status || 'public').toLowerCase();
                if (vis !== 'public' && vis !== 'private' && vis !== 'unlisted' && vis !== 'deleted') vis = 'public';
                var radio = document.querySelector('input[name="edit-visibility"][value="' + vis + '"]');
                if (radio) radio.checked = true;
                var img = document.getElementById('edit-thumb-1');
                var ph = document.getElementById('edit-thumb-placeholder-1');
                var data = short.thumbData || (short.videoData && short.videoData.indexOf('data:') === 0 ? short.videoData : null);
                if (img && ph && data && typeof data === 'string' && data.indexOf('data:') === 0) {
                    img.src = data;
                    img.style.display = 'block';
                    ph.style.display = 'none';
                }
            }
        }

        var fileInput = document.getElementById('edit-thumb-file-1');
        var img = document.getElementById('edit-thumb-1');
        var ph = document.getElementById('edit-thumb-placeholder-1');
        if (fileInput && img && ph) {
            fileInput.addEventListener('change', function() {
                var file = this.files && this.files[0];
                if (!file || !file.type.match(/^image\//)) return;
                var r = new FileReader();
                r.onload = function() {
                    img.src = r.result;
                    img.style.display = 'block';
                    ph.style.display = 'none';
                };
                r.readAsDataURL(file);
            });
        }

        if (formEl) {
            formEl.addEventListener('submit', function(e) {
                e.preventDefault();
                if (!id) return;
                var title = (titleInput && titleInput.value) ? titleInput.value.trim() : '';
                if (!title) { if (titleInput) titleInput.focus(); return; }
                var desc = (descInput && descInput.value) ? descInput.value.trim() : '';
                var visRadio = document.querySelector('input[name="edit-visibility"]:checked');
                var visibility = visRadio ? visRadio.value : 'public';
                var thumbImg = document.getElementById('edit-thumb-1');
                var thumbData = (thumbImg && thumbImg.src && thumbImg.src.indexOf('data:') === 0) ? thumbImg.src : null;
                var list = getShorts();
                for (var i = 0; i < list.length; i++) {
                    if (String(list[i].id) === String(id)) {
                        list[i].title = title;
                        list[i].desc = desc;
                        list[i].visibility = visibility;
                        if (thumbData) list[i].thumbData = thumbData;
                        break;
                    }
                }
                localStorage.setItem('nokShortsVideos', JSON.stringify(list));
                window.location.href = 'studio-shorts.html';
            });
        }
    })();
    </script>
