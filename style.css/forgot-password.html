<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - NOK Super</title>
    <script src="nok-theme.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="video-long.css">
</head>
<body class="home-body">
    <div class="home-layout">
        <div class="bg"></div>

        <header class="long-video__header">
            <div class="long-video__header-left">
                <button type="button" class="long-video__menu" aria-label="Menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <a href="home.html" class="long-video__logo">
                    <img src="../noksuper.png" alt="NOK Super" class="long-video__logo-img">
                </a>
            </div>
            <div class="long-video__search">
                <form class="home-search" action="search.html" method="get" role="search">
                    <svg class="home-search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" class="home-search__input" name="q" placeholder="Search" aria-label="Search">
                    <button type="button" class="home-search__mic" aria-label="Voice search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
                </form>
            </div>
            <div class="long-video__header-right">
                <button type="button" class="long-video__header-icon" id="forgot-notification-btn" aria-label="Notifications" title="Notifications (click to turn off/on)">
                    <span class="long-video__icon-bell-wrap"><svg class="long-video__icon-bell" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span>
                    <span class="long-video__icon-bell-off-wrap" style="display:none"><svg class="long-video__icon-bell-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
                </button>
                <div class="long-video__profile-wrap" id="forgot-profile-wrap" style="display:none">
                    <div class="long-video__avatar" id="forgot-avatar">AZ</div>
                </div>
                <div class="long-video__auth-btns" id="forgot-auth-btns">
                    <a href="login.html" class="home-header__btn home-header__btn--ghost">Log In</a>
                    <a href="signup.html" class="home-header__btn home-header__btn--primary">Sign Up</a>
                </div>
            </div>
        </header>

        <main class="content content--centered">
            <div class="glass glass--login">
                <div id="forgot-step-1">
                    <img src="../noklogo.png" alt="NOK SUPER" class="glass__logo">
                    <h2 class="glass__title">Forgot Password</h2>
                    <p class="glass__subtitle">Enter your email or phone to receive a reset code</p>
                    <div class="glass__tabs">
                        <button type="button" class="glass__tab glass__tab--active" data-type="email">Email</button>
                        <button type="button" class="glass__tab" data-type="phone">Phone</button>
                    </div>
                    <form class="glass__form" id="forgot-form-1">
                        <div id="email-field" class="glass__field">
                            <input type="email" id="forgot-input" class="glass__input" placeholder="Enter your email">
                        </div>
                        <div id="phone-field" class="glass__field glass__field--hidden">
                            <div class="glass__phone-row">
                                <div class="glass__country-picker" id="country-picker-wrap">
                                    <input type="text" class="glass__country-input" id="country-code-trigger" value="+880" inputmode="numeric" placeholder="+1" maxlength="5" aria-haspopup="listbox" autocomplete="off">
                                    <button type="button" class="glass__country-arrow" id="country-code-arrow" aria-label="Open country list">▼</button>
                                    <input type="hidden" id="country-code" value="880">
                                    <ul class="glass__country-dropdown" id="country-code-list" role="listbox" aria-hidden="true"></ul>
                                </div>
                                <input type="tel" id="phone-input" class="glass__input glass__input--phone" placeholder="Phone number">
                            </div>
                        </div>
                        <button type="submit" class="glass__btn glass__btn--primary">Send code</button>
                    </form>
                    <p class="glass__legal"><a href="login.html" class="glass__link">← Back to Log In</a></p>
                </div>
                <div id="forgot-step-2" style="display:none" class="glass--otp-wrap">
                    <button type="button" class="glass__back" id="forgot-back" aria-label="Back">←</button>
                    <img src="../noklogo.png" alt="NOK SUPER" class="glass__logo">
                    <h2 class="glass__title glass__title--verify-otp">Reset Password</h2>
                    <p class="glass__subtitle" id="forgot-otp-subtitle">Enter the 6-digit code sent to your email/phone</p>
                    <form class="glass__form" id="forgot-form-2">
                        <div class="otp-inputs">
                            <input type="text" class="otp__digit" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                            <input type="text" class="otp__digit" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                            <input type="text" class="otp__digit" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                            <input type="text" class="otp__digit" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                            <input type="text" class="otp__digit" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                            <input type="text" class="otp__digit" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                        </div>
                        <div class="glass__input-wrap">
                            <input type="password" id="new-password" class="glass__input glass__input--with-icon" placeholder="New password" minlength="6">
                        </div>
                        <div class="glass__input-wrap">
                            <input type="password" id="confirm-password" class="glass__input glass__input--with-icon" placeholder="Confirm new password" minlength="6">
                        </div>
                        <button type="submit" class="glass__btn glass__btn--primary">Reset Password</button>
                    </form>
                    <p class="glass__legal"><a href="login.html" class="glass__link">← Back to Log In</a></p>
                </div>
            </div>
        </main>
    </div>
    <script>
        (function() {
            var USERS_KEY = 'nokUsers';
            var RESET_KEY = 'nokResetKey';
            function getUsers() { try { return JSON.parse(localStorage.getItem(USERS_KEY) || '[]'); } catch (e) { return []; } }
            function saveUsers(arr) { localStorage.setItem(USERS_KEY, JSON.stringify(arr)); }
            function showError(msg, step) {
                var id = step === 2 ? 'forgot-error-2' : 'forgot-error-1';
                var wrap = document.getElementById(id);
                if (!wrap) {
                    wrap = document.createElement('div');
                    wrap.id = id;
                    wrap.className = 'glass__error';
                    wrap.setAttribute('role', 'alert');
                    var form = step === 2 ? document.getElementById('forgot-form-2') : document.getElementById('forgot-form-1');
                    form.insertBefore(wrap, form.querySelector('.glass__btn'));
                }
                wrap.textContent = msg;
                wrap.style.display = 'block';
            }

            var countries = [{n:"Afghanistan",c:"93"},{n:"Albania",c:"355"},{n:"Algeria",c:"213"},{n:"Argentina",c:"54"},{n:"Australia",c:"61"},{n:"Austria",c:"43"},{n:"Azerbaijan",c:"994"},{n:"Bahrain",c:"973"},{n:"Bangladesh",c:"880"},{n:"Belgium",c:"32"},{n:"Brazil",c:"55"},{n:"Bulgaria",c:"359"},{n:"Cambodia",c:"855"},{n:"Canada",c:"1"},{n:"Chile",c:"56"},{n:"China",c:"86"},{n:"Colombia",c:"57"},{n:"Croatia",c:"385"},{n:"Czech Republic",c:"420"},{n:"Denmark",c:"45"},{n:"Egypt",c:"20"},{n:"Estonia",c:"372"},{n:"Ethiopia",c:"251"},{n:"Finland",c:"358"},{n:"France",c:"33"},{n:"Germany",c:"49"},{n:"Ghana",c:"233"},{n:"Greece",c:"30"},{n:"Hong Kong",c:"852"},{n:"Hungary",c:"36"},{n:"India",c:"91"},{n:"Indonesia",c:"62"},{n:"Iran",c:"98"},{n:"Iraq",c:"964"},{n:"Ireland",c:"353"},{n:"Israel",c:"972"},{n:"Italy",c:"39"},{n:"Japan",c:"81"},{n:"Jordan",c:"962"},{n:"Kazakhstan",c:"7"},{n:"Kenya",c:"254"},{n:"Kuwait",c:"965"},{n:"Malaysia",c:"60"},{n:"Mexico",c:"52"},{n:"Morocco",c:"212"},{n:"Nepal",c:"977"},{n:"Netherlands",c:"31"},{n:"Nigeria",c:"234"},{n:"Norway",c:"47"},{n:"Pakistan",c:"92"},{n:"Peru",c:"51"},{n:"Philippines",c:"63"},{n:"Poland",c:"48"},{n:"Portugal",c:"351"},{n:"Qatar",c:"974"},{n:"Romania",c:"40"},{n:"Russia",c:"7"},{n:"Saudi Arabia",c:"966"},{n:"Singapore",c:"65"},{n:"South Africa",c:"27"},{n:"South Korea",c:"82"},{n:"Spain",c:"34"},{n:"Sri Lanka",c:"94"},{n:"Sweden",c:"46"},{n:"Switzerland",c:"41"},{n:"Taiwan",c:"886"},{n:"Thailand",c:"66"},{n:"Turkey",c:"90"},{n:"Ukraine",c:"380"},{n:"UAE",c:"971"},{n:"UK",c:"44"},{n:"USA",c:"1"},{n:"Vietnam",c:"84"},{n:"Zimbabwe",c:"263"}];
            countries.sort(function(a,b){ return a.n.localeCompare(b.n); });
            var listEl = document.getElementById('country-code-list');
            var triggerEl = document.getElementById('country-code-trigger');
            var inputEl = document.getElementById('country-code');
            var wrapEl = document.getElementById('country-picker-wrap');
            var groups = {};
            countries.forEach(function(x){ var L = x.n[0].toUpperCase(); if (!groups[L]) groups[L] = []; groups[L].push(x); });
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(function(L){
                if (!groups[L]) return;
                groups[L].forEach(function(x){
                    var c = x.c.replace(/-.*/, "");
                    var li = document.createElement("li");
                    li.setAttribute("role", "option");
                    li.dataset.code = c;
                    li.textContent = x.n + " +" + c;
                    listEl.appendChild(li);
                });
            });
            function closeDropdown() { listEl.setAttribute("aria-hidden", "true"); if (triggerEl) triggerEl.setAttribute("aria-expanded", "false"); }
            function openDropdown() { listEl.setAttribute("aria-hidden", "false"); if (triggerEl) triggerEl.setAttribute("aria-expanded", "true"); }
            var arrowBtn = document.getElementById("country-code-arrow");
            if (arrowBtn) arrowBtn.addEventListener("click", function(e) { e.stopPropagation(); if (listEl.getAttribute("aria-hidden") === "true") openDropdown(); else closeDropdown(); });
            if (triggerEl) triggerEl.addEventListener("input", function() { var v = this.value.replace(/\D/g, ""); if (v) { inputEl.value = v; this.value = "+" + v; } });
            if (triggerEl) triggerEl.addEventListener("blur", function() { var v = this.value.replace(/\D/g, ""); if (v) { inputEl.value = v; this.value = "+" + v; } else { this.value = "+880"; inputEl.value = "880"; } });
            listEl.addEventListener("click", function(e) { var li = e.target.closest("li[role=option]"); if (li) { var code = li.dataset.code; inputEl.value = code; triggerEl.value = "+" + code; closeDropdown(); } });
            document.addEventListener("click", function(e) { if (wrapEl && !wrapEl.contains(e.target)) closeDropdown(); });

            document.querySelectorAll('#forgot-step-1 .glass__tab').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#forgot-step-1 .glass__tab').forEach(function(b) { b.classList.remove('glass__tab--active'); });
                    this.classList.add('glass__tab--active');
                    var emailField = document.getElementById('email-field');
                    var phoneField = document.getElementById('phone-field');
                    if (this.dataset.type === 'email') {
                        emailField.classList.remove('glass__field--hidden');
                        phoneField.classList.add('glass__field--hidden');
                        if (document.getElementById('phone-input')) document.getElementById('phone-input').value = '';
                    } else {
                        emailField.classList.add('glass__field--hidden');
                        phoneField.classList.remove('glass__field--hidden');
                        if (document.getElementById('forgot-input')) document.getElementById('forgot-input').value = '';
                    }
                });
            });

            document.getElementById('forgot-form-1').addEventListener('submit', function(e) {
                e.preventDefault();
                var emailField = document.getElementById('email-field');
                var isEmailTab = !emailField.classList.contains('glass__field--hidden');
                var email = (document.getElementById('forgot-input').value || '').trim().toLowerCase();
                var phoneInput = document.getElementById('phone-input');
                var country = (document.getElementById('country-code') && document.getElementById('country-code').value) || '';
                var phoneRaw = (phoneInput && phoneInput.value) ? phoneInput.value.trim() : '';
                var phone = phoneRaw ? (country + '_' + phoneRaw).toLowerCase() : '';
                var key = isEmailTab ? email : phone;
                if (!key) { showError(isEmailTab ? 'Enter your email.' : 'Enter your phone number.', 1); return; }
                var users = getUsers();
                var user = users.find(function(u) {
                    return (u.email && u.email.toLowerCase() === key) || (u.phoneKey && u.phoneKey.toLowerCase() === key);
                });
                if (!user) { showError(isEmailTab ? 'No account found with this email.' : 'No account found with this phone number.', 1); return; }
                sessionStorage.setItem(RESET_KEY, key);
                document.getElementById('forgot-otp-subtitle').textContent = 'Enter the 6-digit code sent to ' + (isEmailTab ? key : ('+' + country + ' ' + phoneRaw)) + ', then set a new password.';
                document.getElementById('forgot-step-1').style.display = 'none';
                document.getElementById('forgot-step-2').style.display = 'block';
                document.querySelectorAll('#forgot-form-2 .otp__digit').forEach(function(d) { d.value = ''; });
            });

            document.getElementById('forgot-back').addEventListener('click', function() {
                document.getElementById('forgot-step-2').style.display = 'none';
                document.getElementById('forgot-step-1').style.display = 'block';
                sessionStorage.removeItem(RESET_KEY);
            });

            document.getElementById('forgot-form-2').addEventListener('submit', function(e) {
                e.preventDefault();
                var key = sessionStorage.getItem(RESET_KEY);
                if (!key) { showError('Session expired. Please start again.', 2); return; }
                var digits = document.querySelectorAll('#forgot-form-2 .otp__digit');
                var code = Array.from(digits).map(function(d) { return d.value; }).join('');
                if (code.length !== 6) { showError('Enter the 6-digit code.', 2); return; }
                var newPass = (document.getElementById('new-password').value || '');
                var confirmPass = (document.getElementById('confirm-password').value || '');
                if (newPass.length < 6) { showError('Password must be at least 6 characters.', 2); return; }
                if (newPass !== confirmPass) { showError('Passwords do not match.', 2); return; }
                var users = getUsers();
                var user = users.find(function(u) {
                    return (u.email && u.email.toLowerCase() === key) || (u.phoneKey && u.phoneKey.toLowerCase() === key);
                });
                if (!user) { showError('Account not found. Please start again.', 2); return; }
                user.password = newPass;
                saveUsers(users);
                sessionStorage.removeItem(RESET_KEY);
                window.location.href = 'login.html?reset=1';
            });

            var digits = document.querySelectorAll('#forgot-form-2 .otp__digit');
            digits.forEach(function(input, i) {
                input.addEventListener('input', function() {
                    if (this.value.length === 1 && i < digits.length - 1) digits[i + 1].focus();
                });
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !this.value && i > 0) digits[i - 1].focus();
                });
            });
        })();
    </script>
    <button type="button" class="chat-trigger chat-trigger--float" aria-label="Chat"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
    <div class="chat-overlay" id="chat-overlay" aria-hidden="true"><div class="chat-overlay__backdrop" id="chat-overlay-backdrop"></div><div class="chat-overlay__card"><div class="chat-overlay__drag-bar" id="chat-drag-handle" title="Drag to move"></div><header class="nok-chat__header"><a href="home.html" class="nok-chat__brand"><span class="nok-chat__logo-text">NOK Chat</span></a><div class="nok-chat__actions"><button type="button" class="nok-chat__action" id="chat-card-resize" aria-label="Resize"><svg class="chat-resize-expand" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button><div class="nok-chat__menu-wrap"><button type="button" class="nok-chat__action" id="chat-menu-trigger" aria-label="Menu">&#8942;</button><div class="nok-chat__menu" id="chat-menu"><button type="button" class="nok-chat__menu-item" id="chat-menu-close">Close chat</button></div></div></div></header><div class="chat-login" id="chat-login"><div class="chat-login__inner chat-login__step-login" id="chat-step-login"><h3 class="chat-login__title">Log in to Chat</h3><a href="login.html" class="chat-login__btn chat-login__btn--link">Log In</a></div><div class="chat-login__inner chat-login__step-verify" id="chat-step-verify" style="display:none"><h3 class="chat-login__title">Verify Mobile</h3><form class="chat-login__form" id="chat-verify-form"><input type="tel" id="chat-verify-phone" class="chat-login__input" placeholder="Mobile number"><button type="submit" class="chat-login__btn" id="chat-send-otp">Send OTP</button></form><div id="chat-otp-step" style="display:none"><input type="text" class="chat-login__otp-digit" maxlength="1"><input type="text" class="chat-login__otp-digit" maxlength="1"><input type="text" class="chat-login__otp-digit" maxlength="1"><input type="text" class="chat-login__otp-digit" maxlength="1"><input type="text" class="chat-login__otp-digit" maxlength="1"><input type="text" class="chat-login__otp-digit" maxlength="1"><button type="button" class="chat-login__btn" id="chat-verify-otp">Verify</button></div></div></div><div class="chat-content" id="chat-content"><div class="nok-chat__list"><a href="#" class="nok-chat__item"><span class="nok-chat__avatar">AR</span><span class="nok-chat__name">Amella Roy</span></a></div></div><div class="chat-overlay__resize-handle" id="chat-resize-handle" aria-label="Resize"></div></div></div>
    <script src="nok-chat-overlay.js"></script>
</body>
</html>
