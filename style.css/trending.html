    <script>
        (function() {
            var playSvg = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
            var trendingLong = [
                { id: 'city', thumb: 'city', title: 'Cyber City Lights', channel: 'A2Zzen', meta: '210K views' },
                { id: 'mountains', thumb: 'mountains', title: 'Dreamy Expedition', channel: 'A2Zzen', meta: '120K views' },
                { id: 'tech', thumb: 'city', title: 'Tech Review 2024', channel: 'NOK Demo', meta: '125K views' },
                { id: 'wild', thumb: 'wild', title: 'Mystic Forest', channel: 'A2Zzen', meta: '95K views' },
                { id: 'food', thumb: 'wild', title: 'Street Food Tour', channel: 'NOK Demo', meta: '92K views' },
                { id: 'waterfall', thumb: 'waterfall', title: 'Ocean Mysteries', channel: 'A2Zzen', meta: '85K views' },
                { id: 'sunset', thumb: 'mountains', title: 'Sunset Vibes', channel: 'NOK Demo', meta: '78K views' },
                { id: 'portrait', thumb: 'portrait', title: 'Desert Adventure', channel: 'A2Zzen', meta: '62K views' },
                { id: 'river', thumb: 'waterfall', title: 'River Journey', channel: 'NOK Demo', meta: '54K views' },
                { id: 'vlog', thumb: 'portrait', title: 'Day in My Life', channel: 'NOK Demo', meta: '45K views' }
            ];
            var trendingShorts = [
                { id: 'dance', thumb: 'dance', title: 'Street Dance Moves', likes: '256K' },
                { id: 'beach', thumb: 'beach', title: 'Beach Sunrise Yoga', likes: '175K' },
                { id: 'night', thumb: 'night', title: 'Night Out Vibes', likes: '149K' },
                { id: 'hike', thumb: 'hike', title: 'Epic Mountain Hike', likes: '148K' },
                { id: 'lights', thumb: 'lights', title: 'Gazing at the Lights', likes: '112K' },
                { id: 'citywalk', thumb: 'citywalk', title: 'Night City Walk', likes: '92K' }
            ];
            var userVideos = JSON.parse(localStorage.getItem('nokUserVideos') || '[]');
            var shortsIds = {};
            (JSON.parse(localStorage.getItem('nokShortsVideos') || '[]')).forEach(function(s) { shortsIds[s.id] = true; });
            var userLong = userVideos.filter(function(v) { return !v.isShorts && !shortsIds[v.id]; }).map(function(v) {
                return { id: v.id, thumb: v.thumb || 'mountains', title: v.title || 'Video', channel: v.channel || 'You', meta: (v.views || '0 views'), thumbData: v.thumbData };
            });
            var longVideos = userLong.concat(trendingLong);
            var rowEl = document.getElementById('trending-video-row');
            if (rowEl) {
                longVideos.forEach(function(v) {
                    var card = document.createElement('a');
                    card.href = 'video.html?id=' + encodeURIComponent(v.id) + '&autoplay=1';
                    card.className = 'home-video-card';
                    var thumbClass = v.thumbData ? '' : ' home-video-card__thumb--' + (v.thumb || 'mountains');
                    var thumbStyle = v.thumbData ? ' style="background-image:url(' + (v.thumbData || '').replace(/"/g, '&quot;') + ');background-size:cover;background-position:center"' : '';
                    card.innerHTML = '<div class="home-video-card__thumb-wrap"><div class="home-video-card__thumb' + thumbClass + '"' + thumbStyle + '></div><div class="home-video-card__play-btn">' + playSvg + '</div><video muted loop playsinline preload="metadata"></video></div><button type="button" class="home-video-card__more" aria-label="More" onclick="event.preventDefault();event.stopPropagation();">⋯</button><h3 class="home-video-card__title">' + (v.title || 'Video') + '</h3><p class="home-video-card__meta">' + (v.channel || 'User') + ' · ' + (v.meta || '0 views') + '</p>';
                    rowEl.appendChild(card);
                    var vEl = card.querySelector('video');
                    if (vEl && typeof nokVideoDB !== 'undefined' && v.id) {
                        (function(vid, vId) {
                            card.addEventListener('mouseenter', function() { nokVideoDB.get(vId).then(function(blob) { if (blob && vid) { vid.src = URL.createObjectURL(blob); vid.play().catch(function(){}); } }); });
                            card.addEventListener('mouseleave', function() { if (vid.src) { vid.pause(); vid.currentTime = 0; URL.revokeObjectURL(vid.src); vid.src = ''; } });
                        })(vEl, v.id);
                    }
                });
            }
            var shortsRow = document.getElementById('trending-shorts-row');
            var userShorts = JSON.parse(localStorage.getItem('nokShortsVideos') || '[]');
            var thumbMap = { mountains: 'hike', waterfall: 'beach', city: 'citywalk', wild: 'hike', portrait: 'short-portrait', night: 'night', hike: 'hike', beach: 'beach', citywalk: 'citywalk', dance: 'dance', lights: 'lights' };
            var shortsList = userShorts.slice(0, 6).map(function(s) {
                return { id: s.id, thumb: thumbMap[s.thumb] || 'night', title: s.title || 'Shorts', likes: s.likes || '0', thumbData: s.thumbData };
            }).concat(trendingShorts);
            if (shortsRow) {
                shortsList.forEach(function(s) {
                    var card = document.createElement('a');
                    card.href = 'shorts.html?id=' + encodeURIComponent(s.id);
                    card.className = 'home-short-card';
                    var thumbClass = s.thumbData ? '' : ' home-short-card__thumb--' + (s.thumb || 'night');
                    var thumbStyle = s.thumbData ? ' style="background-image:url(' + (s.thumbData || '').replace(/"/g, '&quot;') + ');background-size:cover;background-position:center"' : '';
                    card.innerHTML = '<div class="home-short-card__thumb' + thumbClass + '"' + thumbStyle + '></div><div class="home-short-card__content"><p class="home-short-card__likes"><span class="home-short-card__heart">❤</span> ' + s.likes + '</p><h4 class="home-short-card__title">' + (s.title || 'Shorts') + '</h4></div>';
                    shortsRow.appendChild(card);
                });
            }
            function updateTrendingAuthView() {
                var isLoggedIn = (sessionStorage.getItem('nokAuth') === 'loggedIn') || (localStorage.getItem('nokAuth') === 'loggedIn');
                var profileWrap = document.getElementById('trending-profile-wrap');
                var authBtns = document.getElementById('trending-auth-btns');
                if (profileWrap) profileWrap.style.display = isLoggedIn ? 'flex' : 'none';
                if (authBtns) authBtns.style.display = isLoggedIn ? 'none' : 'flex';
                var avatarEl = document.getElementById('trending-avatar');
                if (avatarEl && isLoggedIn) {
                    var name = localStorage.getItem('nokUserChannel') || sessionStorage.getItem('nokUserEmail') || 'You';
                    var initial = (name && name.charAt(0)) ? name.charAt(0).toUpperCase() : '?';
                    var photoUrl = localStorage.getItem('nokUserPhotoUrl');
                    if (photoUrl) avatarEl.innerHTML = '<img src="' + photoUrl.replace(/"/g, '&quot;') + '" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover">';
                    else avatarEl.textContent = initial;
                }
            }
            updateTrendingAuthView();
            window.addEventListener('pageshow', updateTrendingAuthView);
        })();
    </script>
