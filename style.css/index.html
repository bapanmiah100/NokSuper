<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOK Super - Main Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="video-long.css">
</head>
<body class="home-body main-page">
    <div class="home-layout">
        <div class="bg"></div>

        <header class="long-video__header">
            <div class="long-video__header-left">
                <button type="button" class="long-video__menu" aria-label="Menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <a href="home.html" class="long-video__logo">
                    <img src="../noksuper.png" alt="NOK Super" class="long-video__logo-img">
                </a>
            </div>
            <div class="long-video__search">
                <div class="home-search">
                    <svg class="home-search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" class="home-search__input" placeholder="Search">
                    <button type="button" class="home-search__mic" aria-label="Voice search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
                </div>
            </div>
            <div class="long-video__header-right">
                <button type="button" class="long-video__header-icon" id="index-notification-btn" aria-label="Notifications" title="Notifications">
                    <span class="long-video__icon-bell-wrap"><svg class="long-video__icon-bell" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span>
                    <span class="long-video__icon-bell-off-wrap" style="display:none"><svg class="long-video__icon-bell-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
                </button>
                <div class="long-video__profile-wrap" id="index-profile-wrap" style="display:none">
                    <div class="long-video__avatar" id="index-avatar">AZ</div>
                </div>
                <div class="long-video__auth-btns" id="index-auth-btns">
                    <a href="login.html" class="home-header__btn home-header__btn--ghost">Log In</a>
                    <a href="signup.html" class="home-header__btn home-header__btn--primary">Sign Up</a>
                </div>
            </div>
        </header>

        <main class="content" style="position:relative;z-index:1;">
            <section class="left-panel">
                <img src="../noklogo.png" alt="NOK SUPER" class="left-panel__logo">
                <h1 class="greeting">Hello 👋</h1>
                <p class="line">Welcome to NOK Super</p>
                <p class="line">Chat, Call, Watch & Share</p>
                <p class="line">All in one platform.</p>
                <p class="line">Start your journey now.</p>
            </section>

            <section class="right-panel">
                <div class="glass">
                    <img src="../noklogo.png" alt="NOK SUPER" class="glass__logo">
                    <a href="login.html" class="glass__btn glass__btn--primary glass__btn--link">Log In</a>
                    <a href="signup.html" class="glass__btn glass__btn--primary glass__btn--link">Sign Up</a>
                    <p class="glass__legal">By signing up, you agree to Noksuper's Terms of Service and Privacy Policy.</p>
                    <a href="home.html" class="glass__skip" id="skip-link">Skip for now</a>
                </div>
            </section>
        </main>
    </div>
    <script>
        (function() {
            var isLoggedIn = (sessionStorage.getItem('nokAuth') === 'loggedIn') || (localStorage.getItem('nokAuth') === 'loggedIn');
            if (isLoggedIn) {
                window.location.replace('home.html');
                return;
            }
            document.getElementById('skip-link').addEventListener('click', function(e) {
                e.preventDefault();
                sessionStorage.removeItem('nokAuth');
                localStorage.removeItem('nokAuth');
                sessionStorage.setItem('nokSkipped', 'true');
                window.location.href = 'home.html';
            });
        })();
    </script>
    <button type="button" class="chat-trigger chat-trigger--float" aria-label="Chat"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
    <div class="chat-overlay" id="chat-overlay" aria-hidden="true"><div class="chat-overlay__backdrop" id="chat-overlay-backdrop"></div><div class="chat-overlay__card"><div class="chat-overlay__drag-bar" id="chat-drag-handle" title="Drag to move"></div><header class="nok-chat__header"><a href="home.html" class="nok-chat__brand"><span class="nok-chat__logo-text">NOK Chat</span></a><div class="nok-chat__actions"><button type="button" class="nok-chat__action" id="chat-card-resize" aria-label="Resize"><svg class="chat-resize-expand" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button><div class="nok-chat__menu-wrap"><button type="button" class="nok-chat__action" id="chat-menu-trigger" aria-label="Menu">&#8942;</button><div class="nok-chat__menu" id="chat-menu"><button type="button" class="nok-chat__menu-item" id="chat-menu-close">Close chat</button></div></div></div></header><div class="chat-login" id="chat-login"><div class="chat-login__inner chat-login__step-login" id="chat-step-login"><h3 class="chat-login__title">Log in to Chat</h3><a href="login.html" class="chat-login__btn chat-login__btn--link">Log In</a></div><div class="chat-login__inner chat-login__step-verify" id="chat-step-verify" style="display:none"><h3 class="chat-login__title">Verify Mobile</h3><form class="chat-login__form" id="chat-verify-form"><input type="tel" id="chat-verify-phone" class="chat-login__input" placeholder="Mobile number"><button type="submit" class="chat-login__btn" id="chat-send-otp">Send OTP</button></form><div id="chat-otp-step" style="display:none"><input type="text" class="chat-login__otp-digit" maxlength="1"><input type="text" class="chat-login__otp-digit" maxlength="1"><input type="text" class="chat-login__otp-digit" maxlength="1"><input type="text" class="chat-login__otp-digit" maxlength="1"><input type="text" class="chat-login__otp-digit" maxlength="1"><input type="text" class="chat-login__otp-digit" maxlength="1"><button type="button" class="chat-login__btn" id="chat-verify-otp">Verify</button></div></div></div><div class="chat-content" id="chat-content"><div class="nok-chat__list"><a href="#" class="nok-chat__item"><span class="nok-chat__avatar">AR</span><span class="nok-chat__name">Amella Roy</span></a></div></div><div class="chat-overlay__resize-handle" id="chat-resize-handle" aria-label="Resize"></div></div></div>
    <script src="nok-chat-overlay.js"></script>
</body>
</html>
