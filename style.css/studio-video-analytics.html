<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Analytics - Studio - NOK Super</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="video-long.css">
    <style>
        body.studio-body { background: #0f0f1a; min-height: 100vh; }
        .studio-layout { display: flex; min-height: 100vh; }
        .studio-sidebar { width: 240px; background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%); flex-shrink: 0; padding: 20px 0; display: flex; flex-direction: column; }
        .studio-sidebar__logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
        .studio-sidebar__logo-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .studio-sidebar__logo-icon svg { width: 20px; height: 20px; color: #fff; }
        .studio-sidebar__logo-text { font-size: 1.25rem; font-weight: 700; color: #fff; }
        .studio-sidebar__nav { display: flex; flex-direction: column; gap: 4px; }
        .studio-sidebar__item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: background 0.2s, color 0.2s; }
        .studio-sidebar__item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .studio-sidebar__item svg { width: 22px; height: 22px; flex-shrink: 0; }
        .studio-main { flex: 1; min-width: 0; display: flex; flex-direction: column; padding: 24px 32px 100px; }
        .studio-topbar__back { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 10px; background: rgba(139,92,246,0.25); color: #e9d5ff; font-size: 0.9rem; font-weight: 600; text-decoration: none; margin-bottom: 24px; width: fit-content; transition: all 0.2s; }
        .studio-topbar__back:hover { background: rgba(139,92,246,0.4); color: #fff; }
        .studio-topbar__title { font-size: 1.75rem; font-weight: 700; color: #fff; margin: 0 0 24px 0; }
        .video-analytics-card { background: rgba(30,30,50,0.6); border: 1px solid rgba(139,92,246,0.18); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .video-analytics-header { display: flex; gap: 20px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
        .video-analytics-thumb { width: 200px; height: 112px; border-radius: 12px; object-fit: cover; background: rgba(139,92,246,0.2); }
        .video-analytics-thumb-placeholder { width: 200px; height: 112px; border-radius: 12px; background: linear-gradient(135deg, rgba(139,92,246,0.3) 0%, rgba(99,102,241,0.3) 100%); display: flex; align-items: center; justify-content: center; }
        .video-analytics-thumb-placeholder svg { width: 48px; height: 48px; color: rgba(255,255,255,0.5); }
        .video-analytics-title { font-size: 1.25rem; font-weight: 700; color: #fff; margin: 0 0 8px 0; }
        .video-analytics-meta { color: rgba(255,255,255,0.5); font-size: 0.9rem; }
        .video-analytics-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .video-analytics-stat { background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2); border-radius: 12px; padding: 16px; text-align: center; }
        .video-analytics-stat__value { font-size: 1.5rem; font-weight: 700; color: #fff; display: block; margin-bottom: 4px; }
        .video-analytics-stat__label { font-size: 0.8rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.05em; }
        .video-analytics-section__title { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 16px; }
        .video-analytics-chart { background: rgba(20,20,35,0.6); border-radius: 12px; padding: 20px; margin-top: 12px; }
        .video-analytics-bar-wrap { display: flex; flex-direction: column; gap: 14px; }
        .video-analytics-bar-row { display: flex; align-items: center; gap: 12px; }
        .video-analytics-bar-label { width: 100px; font-size: 0.9rem; color: rgba(255,255,255,0.8); flex-shrink: 0; }
        .video-analytics-bar-track { flex: 1; height: 28px; background: rgba(255,255,255,0.08); border-radius: 8px; overflow: hidden; }
        .video-analytics-bar-fill { height: 100%; border-radius: 8px; min-width: 4px; transition: width 0.4s ease; }
        .video-analytics-bar-fill--views { background: linear-gradient(90deg, #8b5cf6, #6366f1); }
        .video-analytics-bar-fill--likes { background: linear-gradient(90deg, #ec4899, #f43f5e); }
        .video-analytics-bar-fill--comments { background: linear-gradient(90deg, #14b8a6, #06b6d4); }
        .video-analytics-bar-fill--super { background: linear-gradient(90deg, #f59e0b, #f97316); }
        .video-analytics-bar-fill--subs { background: linear-gradient(90deg, #22c55e, #10b981); }
        .video-analytics-bar-value { font-size: 0.9rem; font-weight: 600; color: #fff; min-width: 48px; text-align: right; }
        .video-analytics-line-section { margin-top: 28px; }
        .video-analytics-line-title { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 16px; }
        .video-analytics-line-chart { background: rgba(20,20,35,0.6); border-radius: 12px; padding: 20px; overflow: hidden; }
        .video-analytics-line-chart svg { width: 100%; height: 220px; display: block; }
        .video-analytics-line-legend { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
        .video-analytics-line-legend__item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: rgba(255,255,255,0.9); }
        .video-analytics-line-legend__dot { width: 12px; height: 4px; border-radius: 2px; }
        .video-analytics-line-legend__dot--views { background: #8b5cf6; }
        .video-analytics-line-legend__dot--subs { background: #22c55e; }
        .video-analytics-line-legend__dot--super { background: #f97316; }
    </style>
</head>

    <script>
    (function() {
        function qs(name) { return new URLSearchParams(location.search).get(name) || ''; }
        function getUserVideos() { try { return JSON.parse(localStorage.getItem('nokUserVideos') || '[]'); } catch (e) { return []; } }
        function getLongSuperComments() { try { return JSON.parse(localStorage.getItem('nokLongSuperComments') || '{}'); } catch (e) { return {}; } }
        function fmtNum(n) { return n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'K' : n; }

        var id = qs('id');
        var container = document.getElementById('video-analytics-content');
        if (!container) return;

        var videos = getUserVideos();
        var video = null;
        for (var i = 0; i < videos.length; i++) {
            if (String(videos[i].id) === String(id)) { video = videos[i]; break; }
        }

        if (!video) {
            container.innerHTML = '<div class="video-analytics-card"><p style="color: #fca5a5;">Video not found. <a href="studio-videos.html" style="color: #a78bfa;">Back to Video Analytics</a></p></div>';
            return;
        }

        var superByVideo = getLongSuperComments();
        var vid = video.id || '';
        var superCount = (superByVideo[vid] && superByVideo[vid].length) ? superByVideo[vid].length : 0;
        var totalSubs = parseInt(localStorage.getItem('nokTotalSubscribers') || '0', 10) || 0;
        var views = parseInt(video.views || 0, 10);
        var likes = parseInt(video.likes || 0, 10);
        var comments = parseInt(video.comments || 0, 10);
        var subs = (video.subscribers != null && video.subscribers !== '') ? parseInt(video.subscribers, 10) : totalSubs;

        var maxVal = Math.max(views, likes, comments, superCount, subs, 1);
        function pct(n) { return Math.min(100, Math.round((n / maxVal) * 100)); }

        function getAllDaysData(videoId, totalViews, totalSubs, totalSuper) {
            var key = 'nokVideoDailyHistory';
            var all = {};
            try { all = JSON.parse(localStorage.getItem(key) || '{}'); } catch (e) {}
            var list = all[videoId] || [];
            var today = new Date();
            today.setHours(0, 0, 0, 0);
            var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
            var hasToday = false;
            for (var h = 0; h < list.length; h++) {
                if (list[h].date === todayStr) {
                    list[h].views = totalViews;
                    list[h].subscribers = totalSubs;
                    list[h].superComment = totalSuper;
                    hasToday = true;
                    break;
                }
            }
            if (!hasToday) list.push({ date: todayStr, views: totalViews, subscribers: totalSubs, superComment: totalSuper });
            list.sort(function(a, b) { return a.date.localeCompare(b.date); });
            all[videoId] = list.slice(-365);
            try { localStorage.setItem(key, JSON.stringify(all)); } catch (e) {}
            var out = list.slice(-365);
            if (out.length === 0) {
                out = [{ date: todayStr, views: totalViews, subscribers: totalSubs, superComment: totalSuper }];
            }
            return out;
        }

        var allDays = getAllDaysData(vid, views, subs, superCount);
        var n = allDays.length;
        var maxLine = 1;
        for (var d = 0; d < n; d++) {
            maxLine = Math.max(maxLine, allDays[d].views || 0, allDays[d].subscribers || 0, allDays[d].superComment || 0);
        }
        var pad = { left: 40, right: 24, top: 14, bottom: 36 };
        var w = 500; var h = 220;
        var plotW = w - pad.left - pad.right;
        var plotH = h - pad.top - pad.bottom;
        function yPos(val) { return pad.top + plotH * (1 - val / maxLine); }
        function xPos(i) { return n <= 1 ? pad.left + plotW / 2 : pad.left + (plotW * i) / (n - 1); }
        function dayLabel(dateStr) {
            var parts = dateStr.split('-');
            if (parts.length >= 3) return parts[2] + '/' + parts[1];
            return dateStr;
        }
        var viewsPath = []; var subsPath = []; var superPath = [];
        for (var i = 0; i < n; i++) {
            var xi = xPos(i);
            viewsPath.push(xi + ',' + yPos(allDays[i].views || 0));
            subsPath.push(xi + ',' + yPos(allDays[i].subscribers != null ? allDays[i].subscribers : 0));
            superPath.push(xi + ',' + yPos(allDays[i].superComment != null ? allDays[i].superComment : 0));
        }
        var gridLines = '';
        for (var g = 1; g <= 4; g++) {
            var gy = pad.top + (plotH * (4 - g)) / 4;
            gridLines += '<line x1="' + pad.left + '" y1="' + gy + '" x2="' + (w - pad.right) + '" y2="' + gy + '" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4"/>';
        }
        var xLabels = '';
        var step = n <= 8 ? 1 : Math.max(1, Math.floor(n / 8));
        for (var L = 0; L < n; L += step) {
            xLabels += '<text x="' + xPos(L) + '" y="' + (h - 8) + '" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">' + dayLabel(allDays[L].date) + '</text>';
        }
        if (n > 0 && (n - 1) % step !== 0) {
            xLabels += '<text x="' + xPos(n - 1) + '" y="' + (h - 8) + '" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">' + dayLabel(allDays[n - 1].date) + '</text>';
        }
        var lineChartSvg = '<svg viewBox="0 0 500 240" preserveAspectRatio="xMidYMid meet">' +
            '<line x1="' + pad.left + '" y1="' + (h - pad.bottom) + '" x2="' + (w - pad.right) + '" y2="' + (h - pad.bottom) + '" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>' +
            '<line x1="' + pad.left + '" y1="' + pad.top + '" x2="' + pad.left + '" y2="' + (h - pad.bottom) + '" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>' +
            gridLines +
            '<polyline fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="' + viewsPath.join(' ') + '"/>' +
            '<polyline fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="' + subsPath.join(' ') + '"/>' +
            '<polyline fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="' + superPath.join(' ') + '"/>' +
            xLabels +
            '<text x="' + (pad.left - 4) + '" y="' + (pad.top + 3) + '" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="9">' + maxLine + '</text>' +
            '<text x="' + (pad.left - 4) + '" y="' + (h - pad.bottom + 3) + '" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="9">0</text>' +
            '</svg>';

        var title = (video.title || video.id || 'Untitled').toString().replace(/</g, '&lt;');
        var thumbHtml = '';
        if (video.thumbData && typeof video.thumbData === 'string' && video.thumbData.indexOf('data:') === 0) {
            thumbHtml = '<img class="video-analytics-thumb" src="' + video.thumbData.replace(/"/g, '&quot;') + '" alt="">';
        } else {
            thumbHtml = '<div class="video-analytics-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div>';
        }

        var html = '<div class="video-analytics-card">' +
            '<div class="video-analytics-header">' + thumbHtml + '<div><div class="video-analytics-title">' + title + '</div><div class="video-analytics-meta">This video’s analytics</div></div></div>' +
            '<div class="video-analytics-stats">' +
            '<div class="video-analytics-stat"><span class="video-analytics-stat__value">' + fmtNum(views) + '</span><span class="video-analytics-stat__label">Views</span></div>' +
            '<div class="video-analytics-stat"><span class="video-analytics-stat__value">' + fmtNum(likes) + '</span><span class="video-analytics-stat__label">Likes</span></div>' +
            '<div class="video-analytics-stat"><span class="video-analytics-stat__value">' + fmtNum(comments) + '</span><span class="video-analytics-stat__label">Comments</span></div>' +
            '<div class="video-analytics-stat"><span class="video-analytics-stat__value">' + superCount + '</span><span class="video-analytics-stat__label">Super Comment</span></div>' +
            '<div class="video-analytics-stat"><span class="video-analytics-stat__value">' + fmtNum(subs) + '</span><span class="video-analytics-stat__label">Subscribers</span></div>' +
            '</div>' +
            '<div class="video-analytics-section__title">Performance (comparison)</div>' +
            '<div class="video-analytics-chart">' +
            '<div class="video-analytics-bar-wrap">' +
            '<div class="video-analytics-bar-row"><span class="video-analytics-bar-label">Views</span><div class="video-analytics-bar-track"><div class="video-analytics-bar-fill video-analytics-bar-fill--views" style="width:' + pct(views) + '%"></div></div><span class="video-analytics-bar-value">' + fmtNum(views) + '</span></div>' +
            '<div class="video-analytics-bar-row"><span class="video-analytics-bar-label">Likes</span><div class="video-analytics-bar-track"><div class="video-analytics-bar-fill video-analytics-bar-fill--likes" style="width:' + pct(likes) + '%"></div></div><span class="video-analytics-bar-value">' + fmtNum(likes) + '</span></div>' +
            '<div class="video-analytics-bar-row"><span class="video-analytics-bar-label">Comments</span><div class="video-analytics-bar-track"><div class="video-analytics-bar-fill video-analytics-bar-fill--comments" style="width:' + pct(comments) + '%"></div></div><span class="video-analytics-bar-value">' + fmtNum(comments) + '</span></div>' +
            '<div class="video-analytics-bar-row"><span class="video-analytics-bar-label">Super Comment</span><div class="video-analytics-bar-track"><div class="video-analytics-bar-fill video-analytics-bar-fill--super" style="width:' + pct(superCount) + '%"></div></div><span class="video-analytics-bar-value">' + superCount + '</span></div>' +
            '<div class="video-analytics-bar-row"><span class="video-analytics-bar-label">Subscribers</span><div class="video-analytics-bar-track"><div class="video-analytics-bar-fill video-analytics-bar-fill--subs" style="width:' + pct(subs) + '%"></div></div><span class="video-analytics-bar-value">' + fmtNum(subs) + '</span></div>' +
            '</div></div>' +
            '<div class="video-analytics-line-section"><div class="video-analytics-line-title">Proti diner update (suro theke ses)</div>' +
            '<div class="video-analytics-line-chart">' + lineChartSvg + '</div>' +
