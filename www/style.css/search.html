        <header class="long-video__header">

                    <button type="button" class="home-search__clear" aria-label="Clear search" title="Clear" style="display:none"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                    <button type="button" class="home-search__mic" aria-label="Voice search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
                </form>
            </div>
            <div class="long-video__header-right">

                <a href="channel.html" class="long-video__profile-wrap" id="search-profile-wrap" style="display:none;text-decoration:none;color:inherit;" title="Channel"><div class="long-video__avatar" id="search-avatar">?</div></a>
                <div class="long-video__auth-btns" id="search-auth-btns"><a href="login.html" class="home-header__btn home-header__btn--ghost">Log In</a><a href="signup.html" class="home-header__btn home-header__btn--primary">Sign Up</a></div>
            </div>
        </header>
        <div class="header-drawer-backdrop" id="header-drawer-backdrop" aria-hidden="true"></div>

            <nav class="header-drawer__nav">
                <a href="studio.html" class="header-drawer__item"><span class="header-drawer__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span><span>Studio</span></a>
                <a href="library.html#watch-later" class="header-drawer__item"><span class="header-drawer__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span><span>Watch later</span></a>

                <a href="upload.html" class="header-drawer__item"><span class="header-drawer__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span><span>Upload</span></a>
                <div class="header-drawer__divider"></div>
                <a href="settings.html" class="header-drawer__item"><span class="header-drawer__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span><span>Settings</span></a>
            </nav>
        </aside>
        <div class="home-below">
            <div class="home-center" style="flex:1;">
                <main class="home-feed" style="max-width:100%;">
                    <h1 class="search-page-title">Search</h1>
                    <p class="search-page-sub" id="search-query-label">Enter a search term above</p>
                    <section class="home-video-section" id="search-videos-section">
                        <h3 class="home-shorts__title">Videos</h3>
                        <div class="home-video-row" id="search-video-row"></div>
                        <p class="search-empty" id="search-videos-empty" style="display:none;">No videos match your search.</p>
                    </section>
                    <section class="home-shorts-section" id="search-shorts-section">
                        <h3 class="home-shorts__title">Shorts</h3>
                        <div class="home-shorts-row" id="search-shorts-row"></div>
                        <p class="search-empty" id="search-shorts-empty" style="display:none;">No shorts match your search.</p>
                    </section>
                </main>
            </div>
        </div>
        <nav class="home-bottom-nav">
            <a href="home.html" class="home-bottom-nav__item"><span class="home-bottom-nav__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span>Home</span></a>
            <a href="shorts.html" class="home-bottom-nav__item"><span class="home-bottom-nav__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span><span>Shorts</span></a>
            <a href="studio.html" class="home-bottom-nav__item"><span class="home-bottom-nav__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span><span>Studio</span></a>
            <a href="library.html" class="home-bottom-nav__item"><span class="home-bottom-nav__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M18.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12.5"/><path d="M12 11v6"/><path d="M9 14h6"/></svg></span><span>Library</span></a>
        </nav>
    </div>
    <script src="nok-header-drawer.js"></script>
    <script>
(function() {
    var playSvg = '<svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    var params = new URLSearchParams(window.location.search);
    var q = (params.get('q') || '').trim().toLowerCase();
    var searchInput = document.getElementById('search-input');
    if (searchInput) searchInput.value = params.get('q') || '';
    var queryLabel = document.getElementById('search-query-label');
    if (queryLabel) queryLabel.textContent = q ? ('Results for "' + (params.get('q') || '').replace(/</g, '‹').replace(/>/g, '›') + '"') : 'Enter a search term above';
    document.getElementById('header-back-btn').addEventListener('click', function() { window.history.back(); });
    function match(s, term) { return term && s && String(s).toLowerCase().indexOf(term) !== -1; }
    /* No demo: only uploaded videos/shorts. Card = when user uploads, then show. */
    var userVideos = JSON.parse(localStorage.getItem('nokUserVideos') || '[]');
    var shortsIds = {};
    (JSON.parse(localStorage.getItem('nokShortsVideos') || '[]')).forEach(function(s) { shortsIds[s.id] = true; });
    var userLong = userVideos.filter(function(v) { return !v.isShorts && !shortsIds[v.id] && v.visibility !== 'private'; }).map(function(v) {
        return { id: v.id, thumb: v.thumb || 'mountains', title: v.title || 'Video', channel: v.channel || 'You', meta: (v.views || '0 views'), thumbData: v.thumbData };
    });
    var userShorts = JSON.parse(localStorage.getItem('nokShortsVideos') || '[]').filter(function(s) { return s.visibility !== 'private'; }).map(function(s) {
        return { id: s.id, thumb: s.thumb || 'night', title: s.title || 'Shorts', likes: s.likes || '0', thumbData: s.thumbData };
    });
    var allLong = userLong;
    var allShorts = userShorts;
    var thumbToClass = { mountains: 'mountains', waterfall: 'ocean', city: 'city', wild: 'forest', portrait: 'desert', night: 'night', hike: 'hike', beach: 'beach', citywalk: 'citywalk', dance: 'dance', lights: 'lights', 'short-portrait': 'short-portrait' };
    function escapeHtml(str) { if (!str) return ''; return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function render() {
        var filteredLong = q ? allLong.filter(function(v) { return match(v.title, q) || match(v.channel, q); }) : [];
        var filteredShorts = q ? allShorts.filter(function(s) { return match(s.title, q); }) : [];
        var videoRow = document.getElementById('search-video-row');
        var shortsRow = document.getElementById('search-shorts-row');
        var videosEmpty = document.getElementById('search-videos-empty');
        var shortsEmpty = document.getElementById('search-shorts-empty');
        if (videoRow) videoRow.innerHTML = '';
        if (shortsRow) shortsRow.innerHTML = '';
        if (videosEmpty) videosEmpty.style.display = q && filteredLong.length === 0 ? 'block' : 'none';
        if (shortsEmpty) shortsEmpty.style.display = q && filteredShorts.length === 0 ? 'block' : 'none';
        filteredLong.forEach(function(v) {
            var card = document.createElement('a');
            card.href = 'video.html?id=' + encodeURIComponent(v.id) + '&autoplay=1';
            card.className = 'home-video-card';
            var thumbClass = v.thumbData ? '' : ' home-video-card__thumb--' + (thumbToClass[v.thumb] || 'mountains');
            var thumbStyle = v.thumbData ? ' style="background-image:url(' + escapeHtml(v.thumbData) + ');background-size:cover;background-position:center"' : '';
            card.innerHTML = '<div class="home-video-card__thumb-wrap"><div class="home-video-card__thumb' + thumbClass + '"' + thumbStyle + '></div><div class="home-video-card__play-btn">' + playSvg + '</div></div><h3 class="home-video-card__title">' + escapeHtml(v.title || 'Video') + '</h3><p class="home-video-card__meta">' + escapeHtml(v.channel || 'User') + ' · ' + escapeHtml(v.meta || '0 views') + '</p>';
            videoRow.appendChild(card);
        });
        filteredShorts.forEach(function(s) {
            var card = document.createElement('a');
            card.href = 'shorts.html?id=' + encodeURIComponent(s.id);
            card.className = 'home-short-card';
            var thumbClass = s.thumbData ? '' : ' home-short-card__thumb--' + (thumbToClass[s.thumb] || 'night');
            var thumbStyle = s.thumbData ? ' style="background-image:url(' + escapeHtml(s.thumbData) + ');background-size:cover;background-position:center"' : '';
            card.innerHTML = '<div class="home-short-card__thumb' + thumbClass + '"' + thumbStyle + '></div><div class="home-short-card__content"><p class="home-short-card__likes"><span class="home-short-card__heart">❤</span> ' + escapeHtml(s.likes) + '</p><h4 class="home-short-card__title">' + escapeHtml(s.title || 'Shorts') + '</h4></div>';
            shortsRow.appendChild(card);
        });
    }
    render();
    if (searchInput) searchInput.addEventListener('keyup', function(e) { if (e.key === 'Enter') this.closest('form').submit(); });
    var clearBtn = document.querySelector('.home-search__clear');
    function updateClearBtn() {
        if (!clearBtn || !searchInput) return;
        clearBtn.style.display = searchInput.value && searchInput.value.trim() ? '' : 'none';
    }
    if (searchInput && clearBtn) {
        updateClearBtn();
        searchInput.addEventListener('input', updateClearBtn);
        clearBtn.addEventListener('click', function() {
            searchInput.value = '';
            updateClearBtn();
            searchInput.focus();
            window.history.replaceState(null, '', 'search.html');
            var qLabel = document.getElementById('search-query-label');
            if (qLabel) qLabel.textContent = 'Enter a search term above';
            render();
        });
    }
    var profileWrap = document.getElementById('search-profile-wrap');
    var authBtns = document.getElementById('search-auth-btns');
    var avatarEl = document.getElementById('search-avatar');
    function updateAuth() {
        var isLoggedIn = (sessionStorage.getItem('nokAuth') === 'loggedIn') || (localStorage.getItem('nokAuth') === 'loggedIn');
        if (profileWrap) profileWrap.style.display = isLoggedIn ? 'flex' : 'none';
        if (authBtns) authBtns.style.display = isLoggedIn ? 'none' : 'flex';
        if (avatarEl && isLoggedIn) {
            var name = localStorage.getItem('nokUserChannel') || sessionStorage.getItem('nokUserEmail') || 'You';
            var initial = (name && name.charAt(0)) ? name.charAt(0).toUpperCase() : '?';
            var photoUrl = localStorage.getItem('nokUserPhotoUrl');
            if (photoUrl) avatarEl.innerHTML = '<img src="' + photoUrl.replace(/"/g, '&quot;') + '" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover">';
            else avatarEl.textContent = initial;
        }
    }
    updateAuth();
    window.addEventListener('pageshow', updateAuth);
})();
    </script>
    <style>.search-page-title{font-size:1.5rem;font-weight:700;color:#fff;margin:0 0 6px;}.search-page-sub{font-size:0.95rem;color:rgba(255,255,255,0.65);margin:0 0 24px;}.search-empty{color:rgba(255,255,255,0.6);font-size:0.95rem;margin:12px 0;}</style>
</body>
