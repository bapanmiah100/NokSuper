<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="../manifest.json">
    <title>NOK Super - Main Page</title>
    <script src="nok-theme.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="video-long.css">
</head>
<body class="home-body main-page">
    <div class="home-layout">
        <div class="bg"></div>

        <header class="long-video__header">
            <div class="long-video__header-left">
                <a href="home.html" class="long-video__logo">
                    <img src="../noksuper.png" alt="NOK Super" class="long-video__logo-img">
                </a>
            </div>
            <div class="long-video__search">
                <form class="home-search home-search--google" id="index-search-form" action="home.html" method="get" role="search">
                    <svg class="home-search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" class="home-search__input" name="q" placeholder="Search" aria-label="Search" id="index-search-input">
                    <button type="button" class="home-search__clear" aria-label="Clear search" title="Clear" style="display:none"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                    <button type="button" class="home-search__mic" aria-label="Voice search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
                </form>
            </div>
            <div class="long-video__header-right">
                <button type="button" class="long-video__header-icon" id="index-notification-btn" aria-label="Notifications" title="Notifications">
                    <span class="long-video__icon-bell-wrap"><svg class="long-video__icon-bell" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span>
                    <span class="long-video__icon-bell-off-wrap" style="display:none"><svg class="long-video__icon-bell-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
                </button>
                <a href="channel.html" class="long-video__profile-wrap" id="index-profile-wrap" style="display:none;text-decoration:none;color:inherit;" title="Channel">
                    <div class="long-video__avatar" id="index-avatar">AZ</div>
                </a>
                <div class="long-video__auth-btns" id="index-auth-btns">
                    <a href="login.html?next=home.html" class="home-header__btn home-header__btn--ghost">Log In</a>
                    <a href="signup.html?next=home.html" class="home-header__btn home-header__btn--primary">Sign Up</a>
                </div>
            </div>
        </header>

        <main class="content" style="position:relative;z-index:1;">
            <section class="left-panel">
                <img src="../noklogo.png" alt="NOK SUPER" class="left-panel__logo">
                <h1 class="greeting">Hello 👋</h1>
                <p class="line">Welcome to NOK Super</p>
                <p class="line">Chat, Call, Watch & Share</p>
                <p class="line">All in one platform.</p>
                <p class="line">Start your journey now.</p>
            </section>

            <section class="right-panel">
                <div class="glass">
                    <img src="../noklogo.png" alt="NOK SUPER" class="glass__logo">
                    <a href="login.html?next=home.html" class="glass__btn glass__btn--primary glass__btn--link">Log In</a>
                    <a href="signup.html?next=home.html" class="glass__btn glass__btn--primary glass__btn--link">Sign Up</a>
                    <p class="glass__legal">By signing up, you agree to Noksuper's Terms of Service and Privacy Policy.</p>
                    <a href="home.html" class="glass__skip" id="skip-link">Skip for now</a>
                </div>
            </section>
        </main>
    </div>
    <script>
        (function() {
            function isLoggedIn() { return (sessionStorage.getItem('nokAuth') === 'loggedIn') || (localStorage.getItem('nokAuth') === 'loggedIn'); }
            // App open: first time, go directly to Shorts.
            // Use `href` (not `replace`) so `index.html` stays in history for Back navigation.
            try {
                if (!sessionStorage.getItem('nokAutoShortsDone')) {
                    sessionStorage.setItem('nokAutoShortsDone', '1');
                    window.location.href = 'shorts.html';
                    return;
                }
            } catch (e) { }

            function updateAuthView() {
                var profileWrap = document.getElementById('index-profile-wrap');
                var authBtns = document.getElementById('index-auth-btns');
                var avatar = document.getElementById('index-avatar');
                if (isLoggedIn()) {
                    if (profileWrap) profileWrap.style.display = '';
                    if (authBtns) authBtns.style.display = 'none';
                    if (avatar) {
                        var name = (localStorage.getItem('nokUserChannel') || sessionStorage.getItem('nokUserEmail') || 'You').toString().trim();
                        var initial = name ? name.charAt(0).toUpperCase() : '?';
                        var photoUrl = localStorage.getItem('nokUserPhotoUrl') || '';
                        try { var ch = JSON.parse(localStorage.getItem('nokChannelData') || '{}'); if (ch.photoUrl) photoUrl = ch.photoUrl; } catch (_) {}
                        if (photoUrl) avatar.innerHTML = '<img src="' + photoUrl.replace(/"/g, '&quot;') + '" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover">';
                        else avatar.textContent = initial;
                    }
                } else {
                    if (profileWrap) profileWrap.style.display = 'none';
                    if (authBtns) authBtns.style.display = '';
                }
            }
            updateAuthView();
            window.addEventListener('pageshow', updateAuthView);

            var skipLink = document.getElementById('skip-link');
            if (skipLink) skipLink.addEventListener('click', function(e) {
                e.preventDefault();
                sessionStorage.removeItem('nokAuth');
                localStorage.removeItem('nokAuth');
                sessionStorage.setItem('nokSkipped', 'true');
                window.location.href = 'home.html';
            });

            var searchForm = document.getElementById('index-search-form');
            if (searchForm) searchForm.addEventListener('submit', function() {
                var inp = document.getElementById('index-search-input');
                if (inp && !inp.value.trim()) {
                    window.location.href = 'home.html';
                    return false;
                }
            });
            var idxInput = document.getElementById('index-search-input');
            var idxClear = document.querySelector('#index-search-form .home-search__clear');
            function updateIdxClear() {
                if (!idxClear || !idxInput) return;
                idxClear.style.display = idxInput.value && idxInput.value.trim() ? '' : 'none';
            }
            if (idxInput && idxClear) {
                updateIdxClear();
                idxInput.addEventListener('input', updateIdxClear);
                idxClear.addEventListener('click', function() {
                    idxInput.value = '';
                    updateIdxClear();
                    idxInput.focus();
                });
            }

            var notifBtn = document.getElementById('index-notification-btn');
            if (notifBtn) notifBtn.addEventListener('click', function() {
                if (isLoggedIn()) window.location.href = 'home.html';
                else window.location.href = 'login.html?next=home.html';
            });
        })();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('../sw.js', { scope: '/' }).catch(function() {});
            }
        </script>
</body>
</html>
