    <script>
    (function() {
        function getUserVideos() { try { return JSON.parse(localStorage.getItem('nokUserVideos') || '[]'); } catch (e) { return []; } }
        function getPromotionVideos() { try { return JSON.parse(localStorage.getItem('nokPromotionVideos') || '[]'); } catch (e) { return []; } }
        function getLongSuperComments() { try { return JSON.parse(localStorage.getItem('nokLongSuperComments') || '{}'); } catch (e) { return {}; } }
        function fmtNum(n) { return n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'K' : n; }
        var body = document.getElementById('studio-videos-body');
        if (body) {
            var list = getUserVideos();
            var promoList = getPromotionVideos();
            var promoIds = {};
            for (var p = 0; p < promoList.length; p++) { promoIds[String(promoList[p].id)] = true; }
            var superByVideo = getLongSuperComments();
            var totalSubs = parseInt(localStorage.getItem('nokTotalSubscribers') || '0', 10) || 0;
            var subsDisplay = fmtNum(totalSubs);
            if (list.length === 0) {
                body.innerHTML = '<tr><td colspan="10" class="studio-table__empty">No videos yet. Upload a video to see analytics here.</td></tr>';
            } else {
                body.innerHTML = list.map(function(v) {
                    var vid = v.id || '';
                    var title = (v.title || v.id || 'Untitled').replace(/</g, '&lt;');
                    var views = fmtNum(parseInt(v.views || 0, 10));
                    var likes = fmtNum(parseInt(v.likes || 0, 10));
                    var comments = fmtNum(parseInt(v.comments || 0, 10));
                    var superCount = (superByVideo[vid] && superByVideo[vid].length) ? superByVideo[vid].length : 0;
                    var subs = (v.subscribers != null && v.subscribers !== '') ? fmtNum(parseInt(v.subscribers, 10)) : subsDisplay;
                    var analyticsUrl = 'studio-video-analytics.html?id=' + encodeURIComponent(v.id || '');
                    var thumbHtml = '';
                    if (v.thumbData && typeof v.thumbData === 'string' && v.thumbData.indexOf('data:') === 0) {
                        thumbHtml = '<img src="' + v.thumbData.replace(/"/g, '&quot;') + '" alt="" class="studio-table__thumb">';
                    } else {
                        thumbHtml = '<div class="studio-table__thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div>';
                    }
                    var editUrl = 'studio-content-edit.html?type=video&id=' + encodeURIComponent(v.id || '');
                    var inPromo = promoIds[String(vid)];
                    var promoteCell = inPromo
                        ? '<span class="studio-table__promote-added">In promotion · <a href="studio-promotion-setup.html?id=' + encodeURIComponent(v.id || '') + '">Setup</a> · <a href="studio-promotion.html">List</a></span>'
                        : '<a class="studio-table__promote-btn" href="studio-promotion-setup.html?id=' + encodeURIComponent(v.id || '') + '" title="Promotion setup">+ Promote</a>';
                    var vis = (v.visibility || v.status || 'public').toLowerCase();
                    if (vis !== 'public' && vis !== 'private' && vis !== 'unlisted' && vis !== 'deleted') vis = 'public';
                    var statusSelect = '<select class="studio-table__status-select" data-video-id="' + (v.id || '').replace(/"/g, '&quot;') + '" title="Change status">' +
                        '<option value="public"' + (vis === 'public' ? ' selected' : '') + '>Public</option>' +
                        '<option value="private"' + (vis === 'private' ? ' selected' : '') + '>Private</option>' +
                        '<option value="unlisted"' + (vis === 'unlisted' ? ' selected' : '') + '>Unlisted</option>' +
                        '<option value="deleted"' + (vis === 'deleted' ? ' selected' : '') + '>Deleted</option>' +
                        '</select>';
                    var watchUrl = 'video.html?id=' + encodeURIComponent(v.id || '') + '&autoplay=1';
                    return '<tr><td><div class="studio-table__video-cell"><a href="' + analyticsUrl + '" class="studio-table__video-thumb-link">' + thumbHtml + '</a><a href="' + analyticsUrl + '" class="studio-table__link studio-table__video-title">' + title + '</a></div></td><td><a href="' + editUrl + '" class="studio-table__link studio-table__edit-link" title="Edit details or thumbnail">Edit</a></td><td>' + promoteCell + '</td><td>' + views + '</td><td>' + likes + '</td><td>' + comments + '</td><td>' + superCount + '</td><td>' + subs + '</td><td>' + statusSelect + '</td><td><a href="' + watchUrl + '" class="studio-table__play-link" title="Watch" aria-label="Watch"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></a></td></tr>';
                }).join('');
            }
            body.addEventListener('change', function(e) {
                var sel = e.target;
                if (sel.classList && sel.classList.contains('studio-table__status-select') && sel.dataset.videoId !== undefined) {
                    var vid = sel.dataset.videoId;
                    var val = sel.value;
                    var list = getUserVideos();
                    for (var i = 0; i < list.length; i++) {
                        if (String(list[i].id) === String(vid)) {
                            list[i].visibility = val;
                            localStorage.setItem('nokUserVideos', JSON.stringify(list));
                            break;
                        }
                    }
                }
            });
        }
    })();
    </script>
