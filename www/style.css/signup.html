<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sign Up - NOK Super</title>
    <script src="nok-theme.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="video-long.css">
    <script src="nok-config.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .signup-password-meter { display: grid; gap: 10px; margin: -2px 0 2px; }
        .signup-password-meter__bars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .signup-password-meter__bars span { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.1); transition: background 0.2s, box-shadow 0.2s; }
        .signup-password-meter__bars span.is-active { background: linear-gradient(135deg, #6d5efc, #8ca2ff); box-shadow: 0 0 14px rgba(129,140,248,0.28); }
        .signup-password-meter__text { font-size: 0.88rem; color: rgba(220,228,255,0.86); }
        .signup-password-checklist { display: grid; gap: 10px; margin: 0 0 4px; padding: 0; list-style: none; }
        .signup-password-checklist li {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(220,228,255,0.74);
            font-size: 0.9rem;
        }
        .signup-password-checklist li::before {
            content: "";
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: rgba(255,255,255,0.16);
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .signup-password-checklist li.is-valid { color: #dcfce7; }
        .signup-password-checklist li.is-valid::before { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.18); }
        html[data-theme="light"] .signup-password-meter__text,
        html[data-theme="light"] .signup-password-checklist li { color: #334155; }
    </style>
</head>
<body class="home-body">
    <div class="home-layout">
        <div class="bg"></div>

        <header class="long-video__header">
            <div class="long-video__header-left">
                <a href="home.html" class="long-video__logo">
                    <img src="../noksuper.png" alt="NOK Super" class="long-video__logo-img">
                </a>
            </div>
            <div class="long-video__search">
                <form class="home-search" action="search.html" method="get" role="search">
                    <svg class="home-search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" class="home-search__input" name="q" placeholder="Search" aria-label="Search">
                    <button type="button" class="home-search__mic" aria-label="Voice search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
                </form>
            </div>
            <div class="long-video__header-right">
                <button type="button" class="long-video__header-icon" id="signup-notification-btn" aria-label="Notifications" title="Notifications">
                    <span class="long-video__icon-bell-wrap"><svg class="long-video__icon-bell" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span>
                    <span class="long-video__icon-bell-off-wrap" style="display:none"><svg class="long-video__icon-bell-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>
                </button>
                <div class="long-video__profile-wrap" id="signup-profile-wrap" style="display:none">
                    <div class="long-video__avatar" id="signup-avatar">AZ</div>
                </div>
                <div class="long-video__auth-btns" id="signup-auth-btns">
                    <a href="login.html" class="home-header__btn home-header__btn--ghost">Log In</a>
                    <a href="signup.html" class="home-header__btn home-header__btn--primary">Sign Up</a>
                </div>
            </div>
        </header>

        <main class="content content--centered" style="position:relative;z-index:1;">
            <div class="glass glass--login">
                <img src="../noklogo.png" alt="NOK SUPER" class="glass__logo">
                <h2 class="glass__title">Sign Up</h2>
                <form class="glass__form" id="signup-form">
                    <div id="email-field" class="glass__field">
                        <input type="email" id="signup-input" class="glass__input" placeholder="Enter your email" required>
                    </div>
                    <div class="glass__input-wrap">
                        <input type="password" id="password-input" class="glass__input glass__input--with-icon" placeholder="Password">
                        <button type="button" class="glass__eye" id="toggle-password" aria-label="Show password">
                            <svg class="glass__eye-icon glass__eye--show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="glass__eye-icon glass__eye--hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div class="signup-password-meter">
                        <div class="signup-password-meter__bars" id="signup-password-strength-bars">
                            <span></span><span></span><span></span><span></span>
                        </div>
                        <div class="signup-password-meter__text" id="signup-password-strength-text">Strength: waiting for new password</div>
                    </div>
                    <ul class="signup-password-checklist" id="signup-password-checklist">
                        <li data-rule="length">At least 8 characters</li>
                        <li data-rule="upper">Includes an uppercase letter</li>
                        <li data-rule="number">Includes a number</li>
                        <li data-rule="symbol">Includes a symbol</li>
                    </ul>
                    <div class="glass__input-wrap">
                        <input type="password" id="confirm-password-input" class="glass__input glass__input--with-icon" placeholder="Confirm Password">
                        <button type="button" class="glass__eye" id="toggle-confirm-password" aria-label="Show confirm password">
                            <svg class="glass__eye-icon glass__eye--show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="glass__eye-icon glass__eye--hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <button type="submit" class="glass__btn glass__btn--primary">Sign Up</button>
                </form>
                <div class="glass__divider"><span>or</span></div>
                <div id="google-signin-container" class="glass__google-wrap">
                    <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener" class="glass__btn glass__btn--google" id="google-fallback-btn" title="Add Google Client ID in nok-config.js to enable"><svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg> Continue with Google</a>
                </div>
                <p class="glass__legal">Already have an account? <a href="login.html" class="glass__link">Log In</a></p>
            </div>
        </main>
    </div>
    <script>
        (function() {
            var isLoggedIn = (sessionStorage.getItem('nokAuth') === 'loggedIn') || (localStorage.getItem('nokAuth') === 'loggedIn');
            if (isLoggedIn) {
                var next = new URLSearchParams(window.location.search).get('next');
                window.location.replace((next && /^[a-z0-9\-./]+\.html(\?.*)?$/i.test(next)) ? next : 'home.html');
                return;
            }
        })();
        window.handleGoogleCredential = function(response) {
            if (response && response.credential) {
                sessionStorage.setItem('nokAuth', 'loggedIn');
                localStorage.setItem('nokAuth', 'loggedIn');
                localStorage.removeItem('nokMobileVerified');
                var next = new URLSearchParams(window.location.search).get('next');
                window.location.href = (next && /^[a-z0-9\-./]+\.html(\?.*)?$/i.test(next)) ? next : 'home.html';
            }
        };
        (function() {
            var USERS_KEY = 'nokUsers';
            function getUsers() { try { var j = localStorage.getItem(USERS_KEY); return j ? JSON.parse(j) : []; } catch (e) { return []; } }
            function saveUsers(arr) { localStorage.setItem(USERS_KEY, JSON.stringify(arr)); }
            function showError(msg) {
                var wrap = document.getElementById('signup-error');
                if (!wrap) {
                    wrap = document.createElement('div');
                    wrap.id = 'signup-error';
                    wrap.className = 'glass__error';
                    wrap.setAttribute('role', 'alert');
                    document.getElementById('signup-form').insertBefore(wrap, document.querySelector('#signup-form .glass__btn'));
                }
                wrap.textContent = msg;
                wrap.style.display = 'block';
            }
            function evaluatePassword(value) {
                return {
                    length: value.length >= 8,
                    upper: /[A-Z]/.test(value),
                    number: /\d/.test(value),
                    symbol: /[^A-Za-z0-9]/.test(value)
                };
            }
            function updateSignupStrengthMeter() {
                var password = document.getElementById('password-input').value || '';
                var rules = evaluatePassword(password);
                var score = Object.keys(rules).filter(function(key) { return rules[key]; }).length;
                var labels = ['Very weak', 'Weak', 'Good', 'Strong', 'Excellent'];
                document.querySelectorAll('#signup-password-strength-bars span').forEach(function(bar, index) {
                    bar.classList.toggle('is-active', index < score);
                });
                document.getElementById('signup-password-strength-text').textContent = password ? ('Strength: ' + labels[score]) : 'Strength: waiting for new password';
                document.querySelectorAll('#signup-password-checklist li').forEach(function(item) {
                    var rule = item.getAttribute('data-rule');
                    item.classList.toggle('is-valid', !!rules[rule]);
                });
                return { score: score, rules: rules };
            }
            document.getElementById('password-input').addEventListener('input', updateSignupStrengthMeter);
            updateSignupStrengthMeter();
            document.getElementById('signup-form').addEventListener('submit', function(e) {
                e.preventDefault();
                var email = (document.getElementById('signup-input').value || '').trim().toLowerCase();
                var password = (document.getElementById('password-input').value || '');
                var confirmPass = (document.getElementById('confirm-password-input').value || '');
                var strength = updateSignupStrengthMeter();

                if (!email) { showError('Enter your email.'); return; }
                if (strength.score < 4) { showError('Use a stronger password with 8 characters, uppercase, number and symbol.'); return; }
                if (password !== confirmPass) { showError('Passwords do not match.'); return; }

                var key = email;
                var users = getUsers();
                var exists = users.some(function(u) { return u.email && u.email.toLowerCase() === key; });
                if (exists) { showError('This email is already registered.'); return; }

                users.push({ email: key, password: password });
                saveUsers(users);
                sessionStorage.setItem('otpFrom', 'signup');
                sessionStorage.setItem('nokUserEmail', key);
                localStorage.setItem('nokUserEmail', key);
                localStorage.setItem('nokAccountEmail', key);
                localStorage.removeItem('nokMobileVerified');
                var next = new URLSearchParams(window.location.search).get('next');
                if (next && /^[a-z0-9\-./]+\.html(\?.*)?$/i.test(next)) sessionStorage.setItem('nokSignupNext', next);
                window.location.href = 'otp.html';
            });
        })();
        function initGoogleSignIn() {
            var clientId = (window.NOK_GOOGLE_CLIENT_ID || '').trim();
            var container = document.getElementById('google-signin-container');
            if (!container) return;
            if (clientId && typeof google !== 'undefined' && google.accounts && google.accounts.id) {
                container.innerHTML = '';
                google.accounts.id.initialize({ client_id: clientId, callback: handleGoogleCredential });
                google.accounts.id.renderButton(container, { type: 'standard', theme: 'filled_black', size: 'large', text: 'continue_with', width: 320 });
            }
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', function() { setTimeout(initGoogleSignIn, 800); });
        else setTimeout(initGoogleSignIn, 800);
        document.getElementById('toggle-password').addEventListener('click',function(){
            var i=document.getElementById('password-input');
            var s=this.querySelector('.glass__eye--show');
            var h=this.querySelector('.glass__eye--hide');
            if(i.type==='password'){i.type='text';s.style.display='none';h.style.display='block'}
            else{i.type='password';s.style.display='block';h.style.display='none'}
        });
        document.getElementById('toggle-confirm-password').addEventListener('click',function(){
            var i=document.getElementById('confirm-password-input');
            var s=this.querySelector('.glass__eye--show');
            var h=this.querySelector('.glass__eye--hide');
            if(i.type==='password'){i.type='text';s.style.display='none';h.style.display='block'}
            else{i.type='password';s.style.display='block';h.style.display='none'}
        });

        // Force hide header auth buttons (some browsers/app states override CSS).
        try {
            var signupAuth = document.getElementById('signup-auth-btns');
            if (signupAuth) signupAuth.style.setProperty('display', 'none', 'important');
        } catch (e) {}

        // Back from signup should go to the welcome page (index.html).
        // Also clear any stale logged-in flags so index.html doesn't redirect to home.html.
        try {
            window.__nokBackOverride = function () {
                try { sessionStorage.removeItem('nokAuth'); } catch (e) { }
                try { localStorage.removeItem('nokAuth'); } catch (e2) { }
                window.location.replace('index.html');
            };
        } catch (e3) {}
    </script>
</body>
</html>
