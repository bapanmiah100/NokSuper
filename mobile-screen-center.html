<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile screen maj khane</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Maj khane choto mobile er moto – PC te 280px (boroi na), mobile e full */
    .mobile-screen {
      width: 100%;
      max-width: 280px;
      aspect-ratio: 9 / 16;
      max-height: 65vh;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .mobile-screen video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="mobile-screen">
    <video src="video.mp4" autoplay muted loop controls></video>
  </div>
</body>
</html>
