<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reel – full height, 9:16, max 420px</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Reel – mobile e full height, PC te 420px max (mobile er moto) */
    .reel {
      aspect-ratio: 9 / 16;
      height: 100vh;
      max-width: 420px;
      width: 100%;
      background: black;
    }

    .reel video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="reel">
    <video src="video.mp4" autoplay muted loop controls></video>
  </div>
</body>
</html>
